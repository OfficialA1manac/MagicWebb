[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.26"
evm_version = "cancun"
optimizer = true
optimizer_runs = 1_000_000
via_ir = true
fs_permissions = [{ access = "read", path = "./out" }, { access = "read-write", path = "./broadcast" }]

[fmt]
line_length = 110
tab_width = 4
bracket_spacing = false

[rpc_endpoints]
coston2 = "https://coston2-api.flare.network/ext/C/rpc"
mainnet = "https://flare-api.flare.network/ext/C/rpc"

[etherscan]
coston2 = { key = "${ROUTESCAN_API_KEY}", chain = 114, url = "https://api.routescan.io/v2/network/testnet/evm/114/etherscan" }
mainnet = { key = "${ROUTESCAN_API_KEY}", chain = 14, url = "https://api.routescan.io/v2/network/mainnet/evm/14/etherscan" }

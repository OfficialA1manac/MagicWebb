name: CI

on:
  push:
    branches: [main]
    # Phase 5 V5.1: release-tag trigger — runs the FULL suite (Foundry + Slither)
    # on version tags (v*). Normal pushes/PRs skip Foundry/Slither for speed;
    # a release tag gate guarantees those pass before any release.
    tags: ["v*"]
  pull_request:
    branches: [main]

# v35: explicit least-privilege permissions — only contents:read needed
# for checkout; drops the default write scope on GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    steps:
      # v35: pinned to full semver tags (immutable git references) instead
      # of mutable major-version tags (@v4). Dependabot will bump these.
      - uses: actions/checkout@v4.2.0
      # ── Disk space recovery ──────────────────────────────────────────────────
      # GitHub-hosted runners start with ~29 GB free but can drop below 1 GB
      # after checkout + tool downloads. Go's test cache, module cache, and
      # build artifacts can exhaust the remaining space mid-run, producing
      # cryptic ENOSPC (no space left on device) failures. The cleanup below
      # frees ~30+ GB by removing pre-installed toolchains (.NET, Android,
      # Haskell, Swift, etc.) and Docker images we never use. Hazard: if
      # Go's module cache was previously populated, `go clean -modcache`
      # purges it — the next `go build` re-downloads modules, but this is
      # cheaper than an ENOSPC crash mid-pipeline.
      - name: Free disk space
        run: |
          echo "=== Before cleanup ==="
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup
          sudo rm -rf /usr/local/share/powershell /usr/share/swift /usr/local/julia
          sudo docker image prune -af || true
          echo "=== After cleanup ==="
          df -h /
      - uses: actions/setup-go@v5.4.0
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Build
        working-directory: backend
        run: go build ./...
      - name: Vet
        working-directory: backend
        run: go vet ./...
      - name: Vulncheck (Go dependency CVEs)
        working-directory: backend
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
      - name: Test
        working-directory: backend
        run: go test ./...

  contracts:
    name: Contracts (Foundry)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.0
        with:
          submodules: recursive
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1.2.0
      - name: Build
        working-directory: contracts
        run: forge build --sizes
      - name: Test
        working-directory: contracts
        run: forge test -vvv

  slither:
    name: Contracts (Slither)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.0
        with:
          submodules: recursive
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1.2.0
      - name: Slither static analysis
        uses: crytic/slither-action@v0.4.0
        with:
          target: contracts/
          slither-config: contracts/slither.config.json
          fail-on: high

  frontend-lint:
    name: Frontend (Astro check + vitest + guards)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4.2.0
      - name: No .test.* files in pages/
        run: |
          bad=$(find app/src/pages -maxdepth 1 -name '*.test.*' 2>/dev/null)
          if [ -n "$bad" ]; then
            echo "ERROR: .test.* files found in app/src/pages/ — Astro would render them as routes:"
            echo "$bad" | sed 's/^/  /'
            echo "Move them to app/src/__tests__/ instead."
            exit 1
          fi
          echo "OK — no .test.* files in app/src/pages/"
      - uses: actions/setup-node@v4.3.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Install dependencies
        working-directory: app
        run: npm ci
      - name: Astro check (typecheck)
        working-directory: app
        run: npx astro check
      - name: Vitest (unit tests)
        working-directory: app
        run: npx vitest run

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.0
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@4af6123da341504d1141b584faae0815802f5149 # v2.5.0
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

# ── Auto-deploy on push to main ──────────────────────────────────────────────
#
# Flow:  push to main  →  make test (Go race) + frontend (astro check, vitest, guard)  →  fly deploy --remote-only --strategy rolling
#                                                                                      └─ smoke check: curl /healthz
#
# Why a separate workflow instead of extending `ci.yml`:
#   * The existing `ci.yml` runs 4 jobs in parallel on PR + push (backend,
#     contracts/Foundry, slither, gitleaks). Adding a deploy job there
#     would force Foundry tests on every push, adding ≈5–10 min to the
#     go-to-green gate. Foundry is slow and the user-visible deploy
#     latency should be tight.
#   * A dedicated `deploy.yml` keeps the deploy gate short and cheap
#     (just `make test`), and the broader CI runs concurrently from
#     the same push event — both run on a push, neither blocks the
#     other.
#
# Why `make test` only (not Foundry) + frontend gate:
#   The deploy gate now runs `make test` (Go race detector) AND the frontend
#   checks (astro check, vitest, .test.* guard). Foundry contracts tests
#   (slow, flaky on Foundry cache misses) live in CI's contracts job, not
#   here. The frontend checks add ~1-2 minutes but catch Astro type errors,
#   broken vitest suites, and stale test files in pages/ before deploy.
#
# Concurrency: `cancel-in-progress: false` queues any commit pushed
# while a previous deploy is still rolling — at most ONE release is in
# flight per branch at any time. This protects the single-machine
# `min_machines_running = 1` deployment from a race where two deploys
# try to replace the machine simultaneously.
#
# Permissions: each job declares `permissions: { contents: read }`,
# the minimum needed for `actions/checkout`. This drops the default
# write scope on `GITHUB_TOKEN` (OpenSSF Scorecard "least-privilege").
# FLY_API_TOKEN is the only deploy-scope credential — it is scoped to
# a single deploy step (not the job) so a future step that accidentally
# logs `$GITHUB_ENV` cannot leak it.
#
# flyctl install: the canonical `superfly/flyctl-actions` third-party
# action ships without semver tags that would survive a breaking
# release, so we install flyctl directly from https://fly.io/install.sh
# (the same curl-pipe-sh one-liner used in the official Fly docs).
# This drops the third-party-action supply-chain dependency entirely.
#
# Secrets required (GitHub → Settings → Secrets and variables → Actions):
#   FLY_API_TOKEN      — Fly API token with deploy scope.
#                        Create once with:  fly tokens create deploy
#   REOWN_PROJECT_ID   — WalletConnect/Reown project ID from cloud.reown.com
#
# Repository variables (GitHub → Settings → Secrets and variables → Actions → Variables):
#   RPC_URL, RPC_URLS, CHAIN_ID
#   MARKETPLACE_ADDR, AUCTION_ADDR, OFFERBOOK_ADDR, NFT_ADDR, MARKETPLACE_MANAGER_ADDR
#   TRACKED_COLLECTIONS, INDEX_FROM_BLOCK
#   SIWE_DOMAIN, FRONTEND_URL
#
# fly.toml is generated in CI from fly.toml.example + the above vars/secrets.
# fly.toml itself is gitignored — never commit real deployment config.
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy (push to main)

on:
  push:
    branches: [main]

# Repo-wide default: deny everything except contents:read. Each job
# can request additional permissions if needed; both jobs in this
# workflow only need contents:read.
permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: make test (Go race detector)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4.2.0
      - uses: actions/setup-go@v5.4.0
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Install Zig
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq xz-utils
          curl -fsSL https://ziglang.org/download/0.13.0/zig-linux-x86_64-0.13.0.tar.xz -o /tmp/zig.tar.xz
          sudo tar -xJf /tmp/zig.tar.xz -C /usr/local
          sudo ln -sf /usr/local/zig-linux-x86_64-0.13.0/zig /usr/local/bin/zig
          zig version
      - name: Compile Zig libraries (zigmedia)
        run: |
          cd backend/zigsha256 && zig build-lib -O ReleaseFast -dynamic zigsha256.zig && \
          cd ../zigcrypto && zig build-lib -O ReleaseFast -dynamic zigcrypto.zig && \
          cd ../zigsniff && zig build-lib -O ReleaseFast -dynamic zignsniff.zig
      - name: Test (zigmedia, race detector)
        run: cd backend && CGO_ENABLED=1 go test -tags zigmedia ./... -race -count=1 -timeout 120s

  frontend-lint:
    name: Frontend (Astro check + vitest + guards)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4.2.0
      - name: No .test.* files in pages/
        run: |
          bad=$(find app/src/pages -maxdepth 1 -name '*.test.*' 2>/dev/null)
          if [ -n "$bad" ]; then
            echo "ERROR: .test.* files found in app/src/pages/ — Astro would render them as routes:"
            echo "$bad" | sed 's/^/  /'
            echo "Move them to app/src/__tests__/ instead."
            exit 1
          fi
          echo "OK — no .test.* files in app/src/pages/"
      - uses: actions/setup-node@v4.3.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Install dependencies
        working-directory: app
        run: npm ci --legacy-peer-deps
      - name: Astro check (typecheck)
        working-directory: app
        run: npx astro check
      - name: Vitest (unit tests)
        working-directory: app
        run: npx vitest run

      - name: NFT metadata count guard
        # Counts the NFT metadata JSON files and asserts the expected number.
        # When new NFTs are minted, this count must be updated to match
        # totalSupply(). A mismatch means either orphaned metadata (deleted
        # mint, stale file) or a minted token with no metadata (broken image).
        # Expected: 4 (cid-kagenou, garou, itachi-uchiha, will-serfort)
        run: |
          count=$(ls -1 frontend/static/nft/metadata/*.json 2>/dev/null | wc -l)
          expected=4
          if [ "$count" -ne "$expected" ]; then
            echo "ERROR: frontend/static/nft/metadata/ has $count files, expected $expected"
            echo "Update expected count in deploy.yml when minting new NFTs"
            exit 1
          fi
          echo "OK — $count metadata files match expected count ($expected)"

  verify:
    name: Forge verify (FlareScan source verification)
    needs: [test, frontend-lint]
    # Only run on release tags (v*), not on every push to main. FlareScan
    # has API rate limits and flatten+verify takes ~5 minutes — running it
    # on every deploy would waste API tokens and CI time. Release-tag-only
    # ensures verified source is always published alongside a release.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4.2.0
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1.2.0

      - name: Flatten + verify each contract on FlareScan
        # Verifies deployed contracts on FlareScan (blockscout) using forge
        # verify-contract. Contract addresses and chain ID come from GitHub
        # repository variables (vars.*) — the same source as the fly.toml
        # generation step. No addresses are hardcoded in this file.
        #
        # EXPLORER_API_KEY is a GitHub Actions secret. FlareScan requires
        # an API key obtained from https://coston2-explorer.flare.network/.
        env:
          EXPLORER_API_KEY: ${{ secrets.EXPLORER_API_KEY }}
          CHAIN_ID: ${{ vars.CHAIN_ID }}
          MARKETPLACE_ADDR: ${{ vars.MARKETPLACE_ADDR }}
          AUCTION_ADDR: ${{ vars.AUCTION_ADDR }}
          OFFERBOOK_ADDR: ${{ vars.OFFERBOOK_ADDR }}
          NFT_ADDR: ${{ vars.NFT_ADDR }}
          MARKETPLACE_MANAGER_ADDR: ${{ vars.MARKETPLACE_MANAGER_ADDR }}
        run: |
          set -euo pipefail

          # Map chain ID to explorer URL
          case "$CHAIN_ID" in
            14) EXPLORER_URL="https://flare-explorer.flare.network" ;;
            19) EXPLORER_URL="https://songbird-explorer.flare.network" ;;
            114) EXPLORER_URL="https://coston2-explorer.flare.network" ;;
            *) echo "Unknown CHAIN_ID=$CHAIN_ID"; exit 1 ;;
          esac

          echo "Verifying contracts on $EXPLORER_URL (chain $CHAIN_ID)..."

          verify() {
            local name="$1" addr="$2" file="$3"
            echo "--- Verifying $name at $addr ---"
            forge flatten "src/$file" -o "/tmp/${name}_flat.sol"
            forge verify-contract \
              "$addr" \
              "src/$file" \
              --chain "$CHAIN_ID" \
              --verifier blockscout \
              --verifier-url "${EXPLORER_URL}/api/" \
              --etherscan-api-key "$EXPLORER_API_KEY" \
              --watch || echo "⚠  $name verification skipped or failed (check explorer)"
          }

          # Verify marketplace contracts (all are MarketplaceCore derivations)
          verify "MarketplaceManager" "$MARKETPLACE_MANAGER_ADDR" "MarketplaceManager.sol"
          verify "Marketplace"       "$MARKETPLACE_ADDR" "Marketplace.sol"
          verify "AuctionHouse"      "$AUCTION_ADDR" "AuctionHouse.sol"
          verify "OfferBook"         "$OFFERBOOK_ADDR" "OfferBook.sol"
          verify "MagicWebbNFT"      "$NFT_ADDR" "MagicWebbNFT.sol"

  deploy:
    name: fly deploy --remote-only --strategy rolling
    needs: [test, frontend-lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4.2.0
        with:
          fetch-depth: 0
      - name: Install flyctl
        # v35: flyctl is a single static binary installed from fly.io.
        # The install.sh script is served over HTTPS from Fly's CDN.
        # Previous implementation used the same curl pipe (well-known
        # Fly docs pattern). The supply-chain risk is bounded by HTTPS
        # transport integrity and Fly's own CDN security. If flyctl
        # needs stronger verification in the future, the recommended
        # path is: pin a known-good flyctl binary checksum from a
        # previous release and verify it here.
        run: |
          curl -fsSL https://fly.io/install.sh | sh
          echo "$HOME/.fly/bin" >> "$GITHUB_PATH"
      - name: Stamp build SHA into Go source
        # v38 — generate a Go source file with the commit SHA. Fly's remote
        # builder may ignore in-place mutations of tracked files (like sed on
        # the Dockerfile), but it CANNOT ignore a new file in the build context.
        # This file's init() runs at startup and assigns MWServerBuildSHA,
        # overriding the "unknown" default in rest.go. No build args, no mounts,
        # no sed — just a Go file that compiles like any other.
        run: |
          echo "package api; func init() { MWServerBuildSHA = \"$GITHUB_SHA\" }" > backend/internal/api/build_sha_gen.go
          echo "  stamped backend/internal/api/build_sha_gen.go → $GITHUB_SHA"
      - name: Generate fly.toml from template
        # v35 — fly.toml is gitignored and never committed. It is generated
        # here from the public fly.toml.example template by replacing
        # CHANGE_ME_* placeholders with values from GitHub repository
        # variables (vars.*) and secrets (secrets.*). This keeps real
        # deployment config (contract addresses, RPC endpoints, domains)
        # out of the public repository while preserving a readable,
        # self-documenting template for contributors.
        env:
          RPC_URL: ${{ vars.RPC_URL }}
          RPC_URLS: ${{ vars.RPC_URLS }}
          CHAIN_ID: ${{ vars.CHAIN_ID }}
          MARKETPLACE_ADDR: ${{ vars.MARKETPLACE_ADDR }}
          AUCTION_ADDR: ${{ vars.AUCTION_ADDR }}
          OFFERBOOK_ADDR: ${{ vars.OFFERBOOK_ADDR }}
          NFT_ADDR: ${{ vars.NFT_ADDR }}
          MARKETPLACE_MANAGER_ADDR: ${{ vars.MARKETPLACE_MANAGER_ADDR }}
          TRACKED_COLLECTIONS: ${{ vars.TRACKED_COLLECTIONS }}
          INDEX_FROM_BLOCK: ${{ vars.INDEX_FROM_BLOCK }}
          SIWE_DOMAIN: ${{ vars.SIWE_DOMAIN }}
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
          WC_PROJECT_ID: ${{ secrets.WC_PROJECT_ID }}
        run: |
          cp fly.toml.example fly.toml
          sed -i "s|CHANGE_ME_RPC_URL|${RPC_URL}|g" fly.toml
          sed -i "s|CHANGE_ME_RPC_URLS|${RPC_URLS}|g" fly.toml
          sed -i "s|CHANGE_ME_CHAIN_ID|${CHAIN_ID}|g" fly.toml
          sed -i "s|CHANGE_ME_MARKETPLACE_ADDR|${MARKETPLACE_ADDR}|g" fly.toml
          sed -i "s|CHANGE_ME_AUCTION_ADDR|${AUCTION_ADDR}|g" fly.toml
          sed -i "s|CHANGE_ME_OFFERBOOK_ADDR|${OFFERBOOK_ADDR}|g" fly.toml
          sed -i "s|CHANGE_ME_NFT_ADDR|${NFT_ADDR}|g" fly.toml
          sed -i "s|CHANGE_ME_MARKETPLACE_MANAGER_ADDR|${MARKETPLACE_MANAGER_ADDR}|g" fly.toml
          sed -i "s|CHANGE_ME_TRACKED_COLLECTIONS|${TRACKED_COLLECTIONS}|g" fly.toml
          sed -i "s|CHANGE_ME_INDEX_FROM_BLOCK|${INDEX_FROM_BLOCK}|g" fly.toml
          sed -i "s|CHANGE_ME_SIWE_DOMAIN|${SIWE_DOMAIN}|g" fly.toml
          sed -i "s|CHANGE_ME_FRONTEND_URL|${FRONTEND_URL}|g" fly.toml
          sed -i "s|CHANGE_ME_WC_PROJECT_ID|${WC_PROJECT_ID}|g" fly.toml
          echo "  generated fly.toml from fly.toml.example"
      - name: Deploy (Fly remote build → rolling release)
        # FLY_API_TOKEN scoped to this single step — narrower blast
        # radius than a job-level env if a future step ever leaks $GITHUB_ENV.
        # REOWN_PROJECT_ID passed as --build-arg so the Dockerfile can inject
        # PUBLIC_REOWN_PROJECT_ID into the Astro build.
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          echo "  deploying commit $GITHUB_SHA"
          fly deploy --remote-only --strategy rolling --build-arg REOWN_PROJECT_ID=${{ secrets.REOWN_PROJECT_ID }}
      - name: Post-deploy smoke check (curl /healthz)
        # Catches the class of failure where `fly deploy` succeeds
        # (image pushes, machine replaces) but the new binary boots
        # into a broken state — first deploy after a bad migration, a
        # failing HTTP check inside the new release, etc.
        if: success()
        run: |
          # v23.1.1 — bump 5s → 30s grace.
          # `fly deploy --strategy rolling` keeps the OLD machine serving
          # until the NEW machine's Fly-side health-check passes. During
          # the swap window both machines can respond to /healthz; a
          # shorter sleep can land the smoke check on the OLD machine,
          # which then surfaces an OUT-OF-DATE SHA to the next sync-gate
          # step (false-positive DRIFT, gates a healthy deploy RED).
          # 30s comfortably covers the rolling-swap transition on a
          # single-machine app — the OLD machine is destroyed and the
          # NEW machine is the sole responder by the time the curl
          # below fires. If you tighten this below ~25s, audit the
          # rolling-strategy swap window on a real OpsGenie-style
          # incident simulation first.
          sleep 30
          curl -fsS --retry 10 --retry-delay 3 --retry-connrefused --retry-all-errors \
            https://magicwebb.fly.dev/healthz
      - name: Post-deploy sync gate (origin/main SHA == live X-MW-Build-SHA)
        # v23.1 — belt-and-braces against the v74-class deploy-drift bug.
        # Closes the gap where Fly records a new release "complete" but
        # the Docker layer cache pinned the previous binary's static
        # assets — origin/main advances, the served wallet.js /
        # tailwind.css / templates silently fall behind. The script
        # reads Fly's X-MW-Build-SHA header (linker-injected via
        # Makefile -ldflags) and asserts equality with origin/main. A
        # mismatch exit-codes 1 and the deploy is marked failed in the
        # GitHub Actions UI even though Fly itself reported success.
        # This step is the contract that future drift can never again
        # be silently observed by a user on the live URL.
        #
        # v23.1.1 — `if: always()` (not `if: success()`).
        # If the previous `curl /healthz` smoke step failed (binary
        # returned 503, network blip, machine still warming up), the
        # original gating made the sync gate SKIP silently — so a deploy
        # that broke the binary OR left Fly serving a stale-SHA binary
        # both reported GREEN to the v23.1 series. Switching to
        # `if: always()` means the drift check runs in every terminal
        # state: success / failure / cancelled. check-fly-sync.sh
        # already handles degraded `/healthz` (curl 000 / non-200 / no
        # header) by exiting 2 — so a smoke-check failure today ALSO
        # lights up the sync gate with a loud `no X-MW-Build-SHA
        # header` output. Operators see exactly which class of bug
        # the deploy had (binary-broken vs SHA-drift) instead of
        # ambiguous green.
        if: always()
        run: ./tools/check-fly-sync.sh

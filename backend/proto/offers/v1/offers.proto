syntax = "proto3";

package offers.v1;

import "common/v1/common.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

option go_package = "github.com/OfficialA1manac/MagicWebb/backend/gen/offers/v1;offersv1";

service OffersService {
  rpc GetOffer(GetOfferRequest)         returns (Offer);
  rpc ListOffers(ListOffersRequest)     returns (ListOffersResponse);

  // Notify stores an EIP-712 signed offer payload and pushes a
  // real-time notification to the token owner via Supabase Realtime.
  rpc NotifyOffer(NotifyOfferRequest)   returns (NotifyOfferResponse);

  // Server-push for offer events (accepted, cancelled)
  rpc StreamOfferEvents(google.protobuf.Empty) returns (stream OfferEvent);
}

// ── Messages ───────────────────────────────────────────────────────────────

message Offer {
  string            offer_id   = 1; // UUID, server-assigned
  common.v1.Address bidder     = 2;
  common.v1.Address collection = 3;
  // token_id == "" or "0" means collection-wide offer (ERC721 only)
  common.v1.TokenId token_id   = 4;
  common.v1.Wei     amount     = 5;
  uint64            nonce      = 6;
  google.protobuf.Timestamp expires_at = 7;
  google.protobuf.Timestamp created_at = 8;
  // EIP-712 signature (65 bytes, hex-encoded)
  string            signature  = 9;
  OfferStatus       status     = 10;
}

enum OfferStatus {
  OFFER_STATUS_UNSPECIFIED = 0;
  PENDING   = 1;
  ACCEPTED  = 2;
  CANCELLED = 3;
  EXPIRED   = 4;
}

message OfferEvent {
  common.v1.EventType type    = 1;
  Offer               offer   = 2;
  google.protobuf.Timestamp occurred_at = 3;
}

// ── Requests / Responses ───────────────────────────────────────────────────

message GetOfferRequest {
  string offer_id = 1;
}

message ListOffersRequest {
  common.v1.Address    collection = 1;
  common.v1.TokenId    token_id   = 2;
  common.v1.Address    bidder     = 3; // optional: filter by bidder
  common.v1.Address    owner      = 4; // optional: filter by token owner
  OfferStatus          status     = 5;
  common.v1.Pagination pagination = 6;
}

message ListOffersResponse {
  repeated Offer       offers      = 1;
  common.v1.PageCursor next_cursor = 2;
}

message NotifyOfferRequest {
  Offer offer = 1;
}

message NotifyOfferResponse {
  string offer_id = 1;
}

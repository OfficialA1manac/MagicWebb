syntax = "proto3";
package webbplace.pricing.v1;
option go_package = "github.com/webbplace/backend/internal/grpc/gen/pricing;pricingpb";

message Address  { string addr = 1; }
message Price    { string wei = 1; }
message Window   { int64 from_unix = 1; int64 to_unix = 2; string collection = 3; }
message Volume   { string total_wei = 1; int64 sales_count = 2; }

service Pricing {
  rpc FloorPrice(Address) returns (Price);
  rpc Volume(Window)      returns (Volume);
}

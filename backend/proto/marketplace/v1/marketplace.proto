syntax = "proto3";

package marketplace.v1;

import "common/v1/common.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

option go_package = "github.com/OfficialA1manac/MagicWebb/backend/gen/marketplace/v1;marketplacev1";

service MarketplaceService {
  // Point queries
  rpc GetListing(GetListingRequest)       returns (Listing);
  rpc GetCollection(GetCollectionRequest) returns (Collection);

  // Paginated lists
  rpc ListListings(ListListingsRequest)       returns (ListListingsResponse);
  rpc ListCollections(ListCollectionsRequest) returns (ListCollectionsResponse);
  rpc GetTrending(GetTrendingRequest)         returns (GetTrendingResponse);

  // Server-push event stream (consumed by WS gateway)
  rpc StreamListingEvents(google.protobuf.Empty) returns (stream ListingEvent);
}

// ── Messages ───────────────────────────────────────────────────────────────

message Listing {
  common.v1.Address    collection = 1;
  common.v1.TokenId    token_id   = 2;
  common.v1.Address    seller     = 3;
  common.v1.Wei        price      = 4;
  uint64               amount     = 5; // always 1 for ERC721
  common.v1.TokenStandard standard = 6;
  google.protobuf.Timestamp expires_at = 7;
  google.protobuf.Timestamp listed_at  = 8;
  string tx_hash = 9;
  // Denormalised token metadata (populated by indexer join)
  string name        = 10;
  string image_uri   = 11;
}

message Collection {
  common.v1.Address    address        = 1;
  string               name           = 2;
  string               symbol         = 3;
  common.v1.TokenStandard standard    = 4;
  common.v1.Wei        floor_price    = 5;
  common.v1.Wei        volume_24h     = 6;
  float                trending_score = 7;
  uint64               listed_count   = 8;
}

message ListingEvent {
  common.v1.EventType type    = 1;
  Listing             listing = 2;
  google.protobuf.Timestamp occurred_at = 3;
}

// ── Requests / Responses ───────────────────────────────────────────────────

message GetListingRequest {
  common.v1.Address collection = 1;
  common.v1.TokenId token_id   = 2;
}

message GetCollectionRequest {
  common.v1.Address address = 1;
}

message ListListingsRequest {
  common.v1.Address collection = 1; // optional filter
  common.v1.Address seller     = 2; // optional filter
  common.v1.Pagination pagination = 3;
  ListingsSortBy sort_by = 4;
}

enum ListingsSortBy {
  LISTINGS_SORT_BY_UNSPECIFIED  = 0;
  LISTINGS_SORT_BY_PRICE_ASC    = 1;
  LISTINGS_SORT_BY_PRICE_DESC   = 2;
  LISTINGS_SORT_BY_RECENT       = 3;
  LISTINGS_SORT_BY_EXPIRY       = 4;
}

message ListListingsResponse {
  repeated Listing     listings    = 1;
  common.v1.PageCursor next_cursor = 2;
}

message ListCollectionsRequest {
  common.v1.Pagination pagination = 1;
}

message ListCollectionsResponse {
  repeated Collection  collections = 1;
  common.v1.PageCursor next_cursor = 2;
}

message GetTrendingRequest {
  uint32 limit    = 1; // max 50
  string time_window = 2; // "1h" | "24h" | "7d"
}

message GetTrendingResponse {
  repeated Collection collections = 1;
}

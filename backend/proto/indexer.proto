syntax = "proto3";
package webbplace.indexer.v1;
option go_package = "github.com/webbplace/backend/internal/grpc/gen/indexer;indexerpb";

message Empty {}

message CursorResp {
  int32 chain_id   = 1;
  int64 last_block = 2;
}

message Range {
  int64 from_block = 1;
  int64 to_block   = 2;
}

message LogEvent {
  bytes  tx_hash      = 1;
  int64  block_number = 2;
  int32  log_index    = 3;
  string event_name   = 4;
  bytes  payload      = 5; // ABI-encoded data
}

service Indexer {
  rpc Cursor(Empty)    returns (CursorResp);
  rpc Backfill(Range)  returns (stream LogEvent);
}

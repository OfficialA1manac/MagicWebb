syntax = "proto3";
package webbplace.matcher.v1;
option go_package = "github.com/webbplace/backend/internal/grpc/gen/matcher;matcherpb";

message TokenRef { string collection = 1; string token_id = 2; }

message Offer {
  string bidder      = 1;
  string collection  = 2;
  string token_id    = 3;   // empty = collection-wide
  string amount_wei  = 4;
  int64  expires_at  = 5;
  string nonce       = 6;
  bytes  signature   = 7;
}

message Validity {
  bool   valid   = 1;
  string reason  = 2;
}

service Matcher {
  rpc BestOffer(TokenRef) returns (Offer);
  rpc ValidateOffer(Offer) returns (Validity);
}

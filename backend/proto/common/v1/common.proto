syntax = "proto3";

package common.v1;

option go_package = "github.com/OfficialA1manac/MagicWebb/backend/gen/common/v1;commonv1";

// Checksummed EIP-55 hex address (42 chars, 0x-prefixed).
message Address {
  string value = 1;
}

// Big-endian 256-bit unsigned integer for ETH/wei amounts.
message Wei {
  bytes value = 1;
}

// Decimal string representation of uint256 token ID.
message TokenId {
  string value = 1;
}

// Opaque pagination cursor (base64-encoded composite key).
message PageCursor {
  string value = 1;
}

message Pagination {
  uint32 limit  = 1;
  PageCursor cursor = 2;
}

enum TokenStandard {
  TOKEN_STANDARD_UNSPECIFIED = 0;
  ERC721  = 1;
  ERC1155 = 2;
}

enum EventType {
  EVENT_TYPE_UNSPECIFIED = 0;
  LISTED                 = 1;
  DELISTED               = 2;
  SALE                   = 3;
  AUCTION_CREATED        = 4;
  BID_PLACED             = 5;
  AUCTION_SETTLED        = 6;
  AUCTION_CANCELLED      = 7;
  OFFER_ACCEPTED         = 8;
}

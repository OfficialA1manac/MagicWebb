syntax = "proto3";

package auction.v1;

import "common/v1/common.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

option go_package = "github.com/OfficialA1manac/MagicWebb/backend/gen/auction/v1;auctionv1";

service AuctionService {
  rpc GetAuction(GetAuctionRequest)   returns (Auction);
  rpc ListAuctions(ListAuctionsRequest) returns (ListAuctionsResponse);

  // Server-push: all live bid / settlement events
  rpc StreamAuctionEvents(google.protobuf.Empty) returns (stream AuctionEvent);

  // Countdown sync — returns authoritative server time so clients can
  // render NTP-locked countdowns without local clock drift.
  rpc GetServerTime(google.protobuf.Empty) returns (ServerTimeResponse);
}

// ── Messages ───────────────────────────────────────────────────────────────

message Auction {
  uint64               auction_id     = 1;
  common.v1.Address    collection     = 2;
  common.v1.TokenId    token_id       = 3;
  common.v1.Address    seller         = 4;
  common.v1.TokenStandard standard    = 5;
  common.v1.Wei        reserve_price  = 6;
  common.v1.Wei        highest_bid    = 7;
  common.v1.Address    highest_bidder = 8;
  uint32               min_increment_bps = 9;
  google.protobuf.Timestamp starts_at  = 10;
  google.protobuf.Timestamp ends_at    = 11;
  bool                 settled        = 12;
  bool                 cancelled      = 13;
  // Denormalised token metadata
  string name      = 14;
  string image_uri = 15;
}

message Bid {
  uint64             auction_id = 1;
  common.v1.Address  bidder     = 2;
  common.v1.Wei      amount     = 3;
  google.protobuf.Timestamp placed_at = 4;
  string             tx_hash   = 5;
}

message AuctionEvent {
  common.v1.EventType type = 1;
  oneof payload {
    Auction auction = 2;
    Bid     bid     = 3;
  }
  google.protobuf.Timestamp occurred_at = 4;
}

message ServerTimeResponse {
  // Unix milliseconds from server (NTP-synced host)
  int64 unix_ms = 1;
}

// ── Requests / Responses ───────────────────────────────────────────────────

message GetAuctionRequest {
  uint64 auction_id = 1;
}

message ListAuctionsRequest {
  common.v1.Address    collection = 1; // optional
  AuctionStatus        status     = 2;
  common.v1.Pagination pagination = 3;
}

enum AuctionStatus {
  AUCTION_STATUS_UNSPECIFIED = 0;
  ACTIVE    = 1;
  SETTLED   = 2;
  CANCELLED = 3;
}

message ListAuctionsResponse {
  repeated Auction     auctions    = 1;
  common.v1.PageCursor next_cursor = 2;
}

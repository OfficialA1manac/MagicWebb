type Query {
  listings(collection: String, limit: Int): [ListingItem!]!
  auctions(status: String, limit: Int): [AuctionItem!]!
  marketMetrics: MarketMetrics!
  activityFeed(limit: Int): [ActivityItem!]!
}

type Subscription {
  listingEvents: ListingEvent!
  auctionEvents: AuctionEvent!
  offerEvents: OfferEvent!
  activityFeed: ActivityItem!
}

type ListingEvent {
  type: String!
  collection: String!
  tokenId: String!
  seller: String
  buyer: String
  priceWei: String
  txHash: String!
  timestamp: Int!
}

type AuctionEvent {
  type: String!
  auctionId: String!
  collection: String!
  tokenId: String!
  bidder: String
  amountWei: String
  txHash: String!
  timestamp: Int!
}

type OfferEvent {
  type: String!
  collection: String!
  tokenId: String
  bidder: String!
  amountWei: String!
  nonce: String!
  txHash: String
  timestamp: Int!
}

type ActivityItem {
  type: String!
  collection: String!
  tokenId: String!
  actor: String
  amountWei: String
  txHash: String!
  timestamp: Int!
}

type MarketMetrics {
  totalActiveListings: Int!
  totalSales: Int!
  grossVolumeWei: String!
  totalAuctions: Int!
}

type ListingItem {
  collection: String!
  tokenId: String!
  seller: String!
  priceWei: String!
  expiresAt: Int!
}

type AuctionItem {
  auctionId: String!
  collection: String!
  tokenId: String!
  seller: String!
  reserveWei: String!
  highestBidWei: String!
  endsAt: Int!
  status: String!
}

version: "2"
sql:
  - engine: postgresql
    schema: migrations
    queries: internal/db/query.sql
    gen:
      go:
        package: db
        out: internal/db/gen
        sql_package: pgx/v5
        emit_json_tags: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: numeric
            go_type: string
          - db_type: bytea
            go_type: "[]byte"

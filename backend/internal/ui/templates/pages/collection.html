{{template "layout.html" .}}
{{define "content"}}
{{with .Collection}}
<div class="mb-8">
  <div class="flex items-center gap-4 mb-2">
    <div class="w-14 h-14 rounded-full bg-neutral-800 flex items-center justify-center text-2xl">🗂</div>
    <div>
      <h1 class="text-2xl font-bold text-white flex items-center gap-2">
        <span>{{if .Name}}{{.Name}}{{else}}{{shortAddr .Address}}{{end}}</span>
        {{if .Verified}}<span class="text-emerald-400 text-xl" title="Verified collection">✓</span>{{end}}
      </h1>
      <p class="text-sm text-neutral-500 font-mono">{{.Address}} · {{.Standard}}</p>
    </div>
  </div>
</div>
{{end}}

<div class="mb-4 flex items-center justify-between">
  <h2 class="text-lg font-semibold text-neutral-300">Listings</h2>
  <span class="text-sm text-neutral-500">{{len .Listings}} items</span>
</div>
<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
  {{template "partials/listing_cards.html" .}}
</div>
{{end}}

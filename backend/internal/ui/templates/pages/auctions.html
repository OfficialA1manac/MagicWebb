{{template "layout.html" .}}
{{define "content"}}
<div class="mb-6 flex items-center justify-between">
  <h1 class="text-2xl font-bold text-neutral-200">Live Auctions</h1>
  <span class="text-sm text-neutral-500">{{len .Auctions}} active</span>
</div>

<div id="auctions-grid"
     class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"
     hx-get="/partials/auctions"
     hx-trigger="sse:auction-updated"
     hx-swap="innerHTML">
  {{template "partials/auction_cards.html" .}}
</div>
{{end}}

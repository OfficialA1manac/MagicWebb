{{template "layout.html" .}}
{{define "content"}}
<div class="mb-6 flex items-center justify-between gap-4">
  <h1 class="text-2xl font-bold text-neutral-200">Live Auctions</h1>
  <div class="flex items-center gap-3">
    <span class="text-sm text-neutral-500">{{len .Auctions}} active</span>
    <button @click="$dispatch('open-nft-picker', {action: 'auction'})"
            class="inline-flex items-center gap-1 px-3 py-1.5 rounded-lg bg-emerald-500 hover:bg-emerald-400 text-black text-sm font-bold transition">
      <span class="text-base leading-none">+</span> Auction an NFT
    </button>
  </div>
</div>

<div id="auctions-grid"
     class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"
     hx-get="/partials/auctions"
     hx-trigger="sse:auction-updated"
     hx-swap="innerHTML">
  {{template "partials/auction_cards.html" .}}
</div>
{{end}}

{{template "layout.html" .}}
{{define "content"}}
<div class="mb-8">
  <div class="flex items-center gap-4">
    <div class="w-14 h-14 rounded-full bg-neutral-800 flex items-center justify-center text-2xl">👤</div>
    <div>
      <h1 class="text-xl font-bold text-white font-mono">{{.Addr}}</h1>
      <p class="text-sm text-neutral-500">{{len .Listings}} active listing{{if ne (len .Listings) 1}}s{{end}}</p>
    </div>
  </div>
</div>

<h2 class="text-lg font-semibold text-neutral-300 mb-4">Active Listings</h2>
<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
  {{template "partials/listing_cards.html" .}}
</div>
{{end}}

{{template "layout.html" .}}
{{define "content"}}
<div class="mb-6 flex items-center justify-between">
  <h1 class="text-2xl font-bold text-neutral-200">Active Listings</h1>
  <span class="text-sm text-neutral-500">{{len .Listings}} items</span>
</div>

<div id="listings-grid"
     class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"
     hx-get="/partials/listings"
     hx-trigger="sse:listing-updated"
     hx-swap="innerHTML">
  {{template "partials/listing_cards.html" .}}
</div>
{{end}}

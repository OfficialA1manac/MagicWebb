<!DOCTYPE html>
<html lang="en" class="bg-ink-950 text-white antialiased">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{if .Title}}{{.Title}} — {{end}}MagicWebb</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <!-- Self-hosted Tailwind CSS replaces the prior JIT-compiler runtime
       (https://cdn.tailwindcss.com?plugins=typography). The JIT was a
       multi-MB runtime loader evaluating CSS rules in every browser AND
       an XSS surface if cdn.tailwindcss.com were ever compromised. The
       static bundle at /static/tailwind.css is produced by
       `cmd/buildtailwindcss` from internal/ui/tailwind.config.cjs +
       the template content glob; tree-shaken so only used rules ship.
       The prior runtime tailwind.config object is gone — its theme
       tokens are baked into the compiled CSS at build time. -->
  <link rel="stylesheet" href="/static/tailwind.css">

  <!-- ── Pinned CDN scripts with Subresource Integrity (SRI) checks ──────────
       Each <script> below enforces a SHA-384 integrity check against the
       exact bytes the upstream CDN ships. A CDN-side compromise between
       patches is detected by the browser (script load is REJECTED) instead
       of executing attacker-controlled JS in every connected wallet.

       The integrity values below are deliberately-failing PLACEHOLDER strings
       (sha384-AAA…64As). Browsers parse them as valid base64, compute the
       real SHA-384 of the CDN response, compare, and refuse to load — fail-
       closed at the browser. Real values are produced by:

         go run ./cmd/pinsha

       which fetches each CDN URL once and prints the matching
       `name: sha384-<base64>` line. Operator action: paste each line into
       the integrity="…" attribute for the matching script (the struct­ural
       test in cmd/pinsha/pinsha_test.go enforces this wiring).

       `crossorigin="anonymous"` is REQUIRED on cross-origin <script> tags
       for browsers to perform the integrity check; without it, browsers
       silently skip the check and the SRI guarantee is lost. The four
       values are pinned to specific versions — float-version pins like
       `@3.x.x` would silently change CDN bytes and (because of SRI)
       silently break production. -->

  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"
          integrity="sha384-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
          crossorigin="anonymous" defer></script>
  <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"
          integrity="sha384-BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB"
          crossorigin="anonymous" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.4/ethers.umd.min.js"
          integrity="sha384-CCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCC"
          crossorigin="anonymous" defer></script>
  <script>
    // Server-injected runtime config (single source of truth: backend env).
    window.MW_MARKETPLACE   = '{{.MarketplaceAddr}}';
    window.MW_AUCTION       = '{{.AuctionAddr}}';
    window.MW_OFFERBOOK     = '{{.OfferBookAddr}}';
    window.MW_WC_PROJECT_ID = '{{.WCProjectID}}';
    window.MW_NETWORK_NAME  = 'Flare Coston2';
    window.MW_RPC_URL       = 'https://coston2-api.flare.network/ext/C/rpc';
  </script>
  <!-- wallet.js MUST load before Alpine: it registers the $store.wallet on
       alpine:init, which fires the moment Alpine executes. Deferred scripts
       run in document order — Alpine first would fire the event before the
       listener exists and every wallet UI element silently disappears. -->
  <script src="/static/wallet.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"
          integrity="sha384-DDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDD"
          crossorigin="anonymous" defer></script>
  <style>
    [x-cloak]{display:none}
    body { font-family: 'Inter', system-ui, sans-serif; }
    /* Subtle skeleton shimmer for image placeholders while we fetch. */
    .shimmer { background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.04) 50%, transparent 100%); background-size: 200% 100%; animation: shimmer 2s infinite; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    /* Palette-aware utility classes — one class per palette token, easing
       template authoring without re-stating Tailwind string every time. */
    .glass-dark  { background: rgba(10,10,13,0.78); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); }
    .glass-soft  { background: rgba(15,15,20,0.55); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
    .glow-sky    { box-shadow: 0 0 22px -6px rgba(56,189,248,0.45); }
    .glow-gold   { box-shadow: 0 0 22px -6px rgba(251,191,36,0.50); }
    .glow-violet { box-shadow: 0 0 22px -6px rgba(167,139,250,0.45); }
    /* Wallet button states (sky → gold on hover → violet on active). */
    .btn-sky { background: var(--tw-bg-sky-btn, linear-gradient(135deg,#38bdf8,#0ea5e9)); }
    .ring-focus:focus-visible { outline: 2px solid #38bdf8; outline-offset: 2px; }
  </style>
</head>
<body hx-ext="sse" sse-connect="/events" x-data>

<!-- Nav -->
<nav x-data="{ open: false, wcOpen: false }" class="sticky top-0 z-50 glass-dark border-b border-ink-700/70">
  <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-16">

    <a href="/" class="text-xl font-extrabold tracking-tight text-white flex-shrink-0 flex items-center gap-2">
      <span class="w-8 h-8 rounded-xl bg-sky-btn flex items-center justify-center text-ink-950 text-lg shadow-sky-glow">✦</span>
      <span>Magic<span class="bg-gradient-to-r from-sky-300 via-violet-300 to-gold-300 bg-clip-text text-transparent">Webb</span></span>
    </a>

    <!-- Desktop links -->
    <div class="hidden md:flex items-center gap-6 text-sm text-ink-700">
      <a href="/"             class="hover:text-white transition">Home</a>
      <a href="/listings"     class="hover:text-white transition">Listings</a>
      <a href="/auctions"     class="hover:text-white transition">Auctions</a>
      <a :href="$store.wallet.address ? '/offers?addr=' + $store.wallet.address : '/offers'" class="hover:text-white transition">Offers</a>
      <a href="/search"       class="hover:text-white transition">Search</a>
      <a href="/metrics"      class="hover:text-white transition">Metrics</a>
      <a href="/docs"         class="hover:text-white transition">Docs</a>
    </div>

    <!-- Right: wallet + bell + hamburger -->
    <div class="flex items-center gap-3">
      <!-- Connect: split into MetaMask + WalletConnect v2 -->
      <template x-if="!$store.wallet.connected">
        <div class="relative" @click.outside="wcOpen = false">
          <div class="flex gap-2">
            <button @click="wcOpen = !wcOpen"
                    class="px-5 py-2 rounded-xl btn-sky hover:opacity-95 text-ink-950 font-bold text-sm transition shadow-lg shadow-sky-500/30 active:scale-[0.97] flex items-center gap-2 ring-focus">
              <span class="text-base leading-none">＋</span> Connect Wallet
              <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"/></svg>
            </button>
          </div>
          <!-- Method picker: appears on click -->
          <div x-show="wcOpen" x-cloak x-transition.opacity
               class="absolute right-0 mt-2 w-72 bg-ink-900/95 border border-ink-700 rounded-2xl shadow-2xl backdrop-blur p-2 z-50 ring-focus">
            <button @click="wcOpen=false; $store.wallet.connect('injected')"
                    class="w-full text-left px-3 py-2.5 rounded-xl hover:bg-ink-800 transition flex items-start gap-3">
              <span class="w-9 h-9 rounded-xl bg-sky-500/20 border border-sky-500/30 flex items-center justify-center text-sky-300 text-base font-bold flex-shrink-0">M</span>
              <div>
                <p class="text-sm font-bold text-white">Browser Wallet</p>
                <p class="text-[11px] text-ink-700 mt-0.5">MetaMask, Rabby, any EIP-1193 wallet</p>
              </div>
            </button>
            <button @click="wcOpen=false; $store.wallet.connect('walletconnect')"
                    class="w-full text-left px-3 py-2.5 rounded-xl hover:bg-ink-800 transition flex items-start gap-3 mt-1">
              <span class="w-9 h-9 rounded-xl bg-violet-500/20 border border-violet-500/30 flex items-center justify-center text-violet-300 text-base flex-shrink-0">⌬</span>
              <div>
                <p class="text-sm font-bold text-white">WalletConnect</p>
                <p class="text-[11px] text-ink-700 mt-0.5">Scan a QR from a mobile or hardware wallet</p>
              </div>
            </button>
          </div>
        </div>
      </template>

      <!-- Notification bell -->
      <template x-if="$store.wallet.connected">
        <div class="relative" x-data="{ openBell: false, items: [], loading: false,
              async load() {
                this.loading = true;
                try {
                  const res = await fetch('/api/v1/notifications?limit=20', { headers: $store.wallet.authHeaders() });
                  if (res.ok) { this.items = (await res.json()).notifications || []; }
                } catch {}
                this.loading = false;
                $store.wallet.markNotificationsRead();
              } }">
          <button @click="openBell = !openBell; if (openBell) load()"
                  class="relative p-2 rounded-lg text-ink-100 hover:text-white hover:bg-ink-800 transition ring-focus" aria-label="Notifications">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.4-1.4A2 2 0 0118 14.2V11a6 6 0 10-12 0v3.2c0 .5-.2 1-.6 1.4L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
            <span x-show="$store.wallet.unread > 0" x-cloak
                  class="absolute -top-0.5 -right-0.5 min-w-[18px] h-[18px] px-1 rounded-full bg-gold-400 text-ink-950 text-[10px] font-extrabold flex items-center justify-center"
                  x-text="$store.wallet.unread > 99 ? '99+' : $store.wallet.unread"></span>
          </button>
          <div x-show="openBell" x-cloak @click.outside="openBell = false"
               class="absolute right-0 mt-2 w-80 max-w-[90vw] bg-ink-900/95 border border-ink-700 rounded-2xl shadow-2xl overflow-hidden z-50 backdrop-blur">
            <div class="px-4 py-2 border-b border-ink-700 text-xs font-bold text-ink-500 uppercase tracking-wider">Notifications</div>
            <div class="max-h-96 overflow-y-auto divide-y divide-ink-700">
              <template x-if="loading"><div class="px-4 py-6 text-center text-xs text-ink-700 shimmer">Loading…</div></template>
              <template x-if="!loading && items.length === 0"><div class="px-4 py-6 text-center text-xs text-ink-700">No notifications yet.</div></template>
              <template x-for="n in items" :key="n.id">
                <a :href="n.link || '#'" class="block px-4 py-3 hover:bg-ink-800 transition">
                  <p class="text-sm text-white" x-text="n.title"></p>
                  <p class="text-xs text-ink-500 mt-0.5" x-text="n.body"></p>
                </a>
              </template>
            </div>
          </div>
        </div>
      </template>

      <!-- Connected pill: address + WC indicator + disconnect -->
      <template x-if="$store.wallet.connected">
        <div class="flex items-center gap-2 px-2 py-1 rounded-xl bg-ink-800/80 hover:bg-ink-700 transition ring-focus">
          <div class="relative">
            <span class="block w-2 h-2 rounded-full bg-sky-300 animate-pulse"></span>
          </div>
          <a :href="'/profile/' + $store.wallet.address" class="text-xs text-white hover:text-gold-300 font-mono"
             x-text="$store.wallet.shortAddr"></a>
          <button @click="if (confirm('Disconnect wallet?')) $store.wallet.disconnect()"
                  title="Disconnect"
                  class="text-ink-600 hover:text-gold-400 text-xs leading-none">×</button>
        </div>
      </template>

      <button @click="open = !open" class="md:hidden p-2 rounded-lg text-ink-100 hover:text-white hover:bg-ink-800 transition ring-focus" aria-label="Menu">
        <svg x-show="!open" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        <svg x-show="open" x-cloak class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
  </div>

  <!-- Mobile menu -->
  <div x-show="open" x-cloak class="md:hidden border-t border-ink-700 px-4 py-3 space-y-1 text-sm">
    <a href="/"          class="block py-2 px-3 rounded-lg text-ink-100 hover:text-white hover:bg-ink-800 transition">Home</a>
    <a href="/listings"  class="block py-2 px-3 rounded-lg text-ink-100 hover:text-white hover:bg-ink-800 transition">Listings</a>
    <a href="/auctions"  class="block py-2 px-3 rounded-lg text-ink-100 hover:text-white hover:bg-ink-800 transition">Auctions</a>
    <a :href="$store.wallet.address ? '/offers?addr=' + $store.wallet.address : '/offers'" class="block py-2 px-3 rounded-lg text-ink-100 hover:text-white hover:bg-ink-800 transition">Offers</a>
    <a href="/search"    class="block py-2 px-3 rounded-lg text-ink-100 hover:text-white hover:bg-ink-800 transition">Search</a>
    <a href="/metrics"   class="block py-2 px-3 rounded-lg text-ink-100 hover:text-white hover:bg-ink-800 transition">Metrics</a>
    <a href="/docs"      class="block py-2 px-3 rounded-lg text-ink-100 hover:text-white hover:bg-ink-800 transition">Docs</a>
  </div>
</nav>

{{template "partials/nft_picker.html" .}}

<!-- Toast container -->
<div id="toasts" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none" aria-live="polite"></div>

<!-- SSE plumbing: bump the notification badge on every event, and live-refresh
     any page that declares a [data-live] wrapper listing the SSE event types it
     cares about (debounced — bursts of indexer events cause one refresh). -->
<script>
  (() => {
    let liveTimer = null;
    document.body.addEventListener('htmx:sseMessage', (e) => {
      window.dispatchEvent(new Event('mw-notification'));
      const live = document.querySelector('[data-live]');
      if (!live || !e.detail || !e.detail.type) return;
      if (!live.dataset.live.split(' ').includes(e.detail.type)) return;
      clearTimeout(liveTimer);
      liveTimer = setTimeout(() => {
        htmx.ajax('GET', window.location.pathname + window.location.search, {
          target: '[data-live]', select: '[data-live]', swap: 'outerHTML',
        });
      }, 300);
    });
  })();
</script>

<!-- Page content -->
<main class="max-w-7xl mx-auto px-4 py-8 relative">
  <div class="fixed inset-0 -z-10 bg-sky-radial pointer-events-none"></div>
  {{block "content" .}}{{end}}
</main>

<footer class="border-t border-ink-700 mt-16 py-8 text-center text-ink-600 text-sm">
  <span class="bg-gradient-to-r from-sky-300 via-violet-300 to-gold-300 bg-clip-text text-transparent font-extrabold">MagicWebb</span>
  · Non-custodial NFT marketplace on
  <a href="https://flare.network" class="hover:text-sky-300 transition">Flare Network</a>
  · <a href="https://github.com/OfficialA1manac/MagicWebb" class="hover:text-violet-300 transition">GitHub</a>
  · <a href="/docs" class="hover:text-gold-300 transition">Docs</a>
</footer>

</body>
</html>

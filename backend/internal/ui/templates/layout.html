<!DOCTYPE html>
<html lang="en" class="bg-neutral-950 text-white antialiased">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{if .Title}}{{.Title}} — {{end}}MagicWebb</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { neutral: { 950: '#0a0a0a' } } } } }
  </script>
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js" defer></script>
  <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.4/ethers.umd.min.js" defer></script>
  <script>
    // Server-injected runtime config (single source of truth: backend env).
    window.MW_MARKETPLACE   = '{{.MarketplaceAddr}}';
    window.MW_AUCTION       = '{{.AuctionAddr}}';
    window.MW_OFFERBOOK     = '{{.OfferBookAddr}}';
    window.MW_WC_PROJECT_ID = '{{.WCProjectID}}';
  </script>
  <script src="/static/wallet.js" defer></script>
  <style>[x-cloak]{display:none}</style>
</head>
<body hx-ext="sse" sse-connect="/events" x-data>

<!-- Nav -->
<nav x-data="{ open: false }" class="sticky top-0 z-50 bg-neutral-900/80 backdrop-blur border-b border-neutral-800">
  <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-16">

    <a href="/" class="text-xl font-bold tracking-tight text-white flex-shrink-0">Magic<span class="text-emerald-400">Webb</span></a>

    <!-- Desktop links -->
    <div class="hidden md:flex items-center gap-6 text-sm text-neutral-400">
      <a href="/listings" class="hover:text-white transition">Listings</a>
      <a href="/auctions" class="hover:text-white transition">Auctions</a>
      <a :href="$store.wallet.address ? '/offers?addr=' + $store.wallet.address : '/offers'" class="hover:text-white transition">Offers</a>
      <a href="/search" class="hover:text-white transition">Search</a>
      <a href="/metrics" class="hover:text-white transition">Metrics</a>
    </div>

    <!-- Right: wallet + hamburger -->
    <div class="flex items-center gap-3">
      <template x-if="!$store.wallet.address">
        <button @click="$store.wallet.connect()" class="px-4 py-2 rounded-lg bg-emerald-500 hover:bg-emerald-400 text-black font-semibold text-sm transition">Connect</button>
      </template>
      <!-- Notification bell -->
      <template x-if="$store.wallet.address">
        <div class="relative" x-data="{ openBell: false, items: [], loading: false,
              async load() {
                this.loading = true;
                try {
                  const res = await fetch('/api/v1/notifications?limit=20', { headers: $store.wallet.authHeaders() });
                  if (res.ok) { this.items = (await res.json()).notifications || []; }
                } catch {}
                this.loading = false;
                $store.wallet.markNotificationsRead();
              } }">
          <button @click="openBell = !openBell; if (openBell) load()"
                  class="relative p-2 rounded-lg text-neutral-400 hover:text-white hover:bg-neutral-800 transition" aria-label="Notifications">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.4-1.4A2 2 0 0118 14.2V11a6 6 0 10-12 0v3.2c0 .5-.2 1-.6 1.4L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
            <span x-show="$store.wallet.unread > 0" x-cloak
                  class="absolute -top-0.5 -right-0.5 min-w-[18px] h-[18px] px-1 rounded-full bg-red-500 text-white text-[10px] font-bold flex items-center justify-center"
                  x-text="$store.wallet.unread > 99 ? '99+' : $store.wallet.unread"></span>
          </button>
          <div x-show="openBell" x-cloak @click.outside="openBell = false"
               class="absolute right-0 mt-2 w-80 max-w-[90vw] bg-neutral-900 border border-neutral-800 rounded-xl shadow-2xl overflow-hidden z-50">
            <div class="px-4 py-2 border-b border-neutral-800 text-xs font-semibold text-neutral-400">Notifications</div>
            <div class="max-h-96 overflow-y-auto divide-y divide-neutral-800">
              <template x-if="loading"><div class="px-4 py-6 text-center text-xs text-neutral-600">Loading…</div></template>
              <template x-if="!loading && items.length === 0"><div class="px-4 py-6 text-center text-xs text-neutral-600">No notifications yet.</div></template>
              <template x-for="n in items" :key="n.id">
                <a :href="n.link || '#'" class="block px-4 py-3 hover:bg-neutral-800 transition">
                  <p class="text-sm text-neutral-200" x-text="n.title"></p>
                  <p class="text-xs text-neutral-500 mt-0.5" x-text="n.body"></p>
                </a>
              </template>
            </div>
          </div>
        </div>
      </template>

      <template x-if="$store.wallet.address">
        <div class="flex items-center gap-2">
          <div class="w-2 h-2 rounded-full bg-emerald-400 flex-shrink-0"></div>
          <a :href="'/profile/' + $store.wallet.address" class="text-sm text-neutral-300 hover:text-white font-mono" x-text="$store.wallet.shortAddr"></a>
        </div>
      </template>

      <!-- Hamburger (mobile) -->
      <button @click="open = !open" class="md:hidden p-2 rounded-lg text-neutral-400 hover:text-white hover:bg-neutral-800 transition" aria-label="Menu">
        <svg x-show="!open" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        <svg x-show="open" x-cloak class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
  </div>

  <!-- Mobile menu -->
  <div x-show="open" x-cloak class="md:hidden border-t border-neutral-800 px-4 py-3 space-y-1 text-sm">
    <a href="/listings"  class="block py-2 px-3 rounded-lg text-neutral-400 hover:text-white hover:bg-neutral-800 transition">Listings</a>
    <a href="/auctions"  class="block py-2 px-3 rounded-lg text-neutral-400 hover:text-white hover:bg-neutral-800 transition">Auctions</a>
    <a :href="$store.wallet.address ? '/offers?addr=' + $store.wallet.address : '/offers'" class="block py-2 px-3 rounded-lg text-neutral-400 hover:text-white hover:bg-neutral-800 transition">Offers</a>
    <a href="/search"    class="block py-2 px-3 rounded-lg text-neutral-400 hover:text-white hover:bg-neutral-800 transition">Search</a>
    <a href="/metrics"   class="block py-2 px-3 rounded-lg text-neutral-400 hover:text-white hover:bg-neutral-800 transition">Metrics</a>
  </div>
</nav>

<!-- Global wallet NFT picker -->
{{template "partials/nft_picker.html" .}}

<!-- Toast container -->
<div id="toasts" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none" aria-live="polite"></div>

<!-- Bump the notification badge whenever an SSE event arrives -->
<script>
  document.body.addEventListener('htmx:sseMessage', () => window.dispatchEvent(new Event('mw-notification')));
</script>

<!-- Page content -->
<main class="max-w-7xl mx-auto px-4 py-8">
  {{block "content" .}}{{end}}
</main>

<footer class="border-t border-neutral-800 mt-16 py-8 text-center text-neutral-600 text-sm">
  MagicWebb · Non-custodial NFT marketplace on Flare Network · <a href="https://github.com/OfficialA1manac/MagicWebb" class="hover:text-neutral-400">GitHub</a>
</footer>

</body>
</html>

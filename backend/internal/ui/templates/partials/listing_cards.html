{{define "partials/listing_cards.html"}}
{{range .Listings}}
<div class="bg-neutral-900 rounded-xl overflow-hidden hover:bg-neutral-800 transition group" x-data>
  <div class="aspect-square bg-neutral-800 flex items-center justify-center text-neutral-600 text-xs group-hover:bg-neutral-700 transition">
    NFT
  </div>
  <div class="p-3">
    <p class="text-xs text-neutral-500 truncate font-mono">{{shortAddr .Collection}}</p>
    <p class="text-sm font-medium text-white mt-0.5">#{{.TokenID}}</p>
    <p class="text-emerald-400 font-bold text-sm mt-1">{{wei2eth .PriceWei}} FLR</p>
    <button
      class="mt-2 w-full py-1.5 rounded-lg bg-emerald-500 hover:bg-emerald-400 text-black text-xs font-bold transition"
      @click="$dispatch('buy', {collection: '{{.Collection}}', tokenId: '{{.TokenID}}', price: '{{.PriceWei}}'})">
      Buy Now
    </button>
  </div>
</div>
{{end}}
{{end}}

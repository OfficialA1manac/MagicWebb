{{define "partials/listing_cards.html"}}
{{range .Listings}}
<a href="/token/{{.Collection}}/{{.TokenID}}"
   class="bg-neutral-900 rounded-xl overflow-hidden hover:bg-neutral-800 transition group block" x-data>
  <div class="aspect-square overflow-hidden bg-neutral-800">
    {{if .ImageURI}}
    <img src="{{mediaURL .ImageURI}}" alt="{{if .Name}}{{.Name}}{{else}}#{{.TokenID}}{{end}}"
         class="w-full h-full object-cover group-hover:scale-105 transition duration-300"
         onerror="this.style.display='none';this.nextElementSibling.classList.remove('hidden')">
    <div class="w-full h-full hidden flex items-center justify-center text-neutral-600 text-xs group-hover:bg-neutral-700 transition">NFT</div>
    {{else}}
    <div class="w-full h-full flex items-center justify-center text-neutral-600 text-xs group-hover:bg-neutral-700 transition">
      NFT
    </div>
    {{end}}
  </div>
  <div class="p-3">
    <p class="text-xs text-neutral-500 truncate font-mono">
      {{shortAddr .Collection}}{{if .CollectionVerified}} <span class="text-emerald-400" title="Verified collection">✓</span>{{end}}
    </p>
    <p class="text-sm font-medium text-white mt-0.5">{{if .Name}}{{.Name}}{{else}}#{{.TokenID}}{{end}}</p>
    <p class="text-emerald-400 font-bold text-sm mt-1">{{wei2eth .PriceWei}} FLR</p>
    <button
      class="mt-2 w-full py-1.5 rounded-lg bg-emerald-500 hover:bg-emerald-400 text-black text-xs font-bold transition"
      @click.prevent="$dispatch('buy', {collection: '{{.Collection}}', tokenId: '{{.TokenID}}', seller: '{{.Seller}}', price: '{{.PriceWei}}'})">
      Buy Now
    </button>
  </div>
</a>
{{end}}
{{end}}

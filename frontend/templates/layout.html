<!DOCTYPE html>
<html lang="en" class="bg-ink-950 text-white antialiased">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#7dd3fc">
  <!-- Inline SVG favicon — defeats the implicit GET /favicon.ico on every page
       load (which previously logged a noisy 404 in the console). Self-contained,
       same-origin, ZERO third-party dependency. The 5-color ✦ glyph matches
       the navbar logo (layout.html header <span class="brand-text">) so the
       browser tab is on-brand out of the box. -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%237dd3fc'/><text x='16' y='23' font-size='22' font-family='sans-serif' font-weight='900' text-anchor='middle' fill='%2309090b'>%E2%9C%A6</text></svg>">
  <title>{{if .Title}}{{.Title}} — {{end}}MagicWebb</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- v23.5: removed <link rel="preconnect" href="https://esm.sh" crossorigin>.
       Was pre-warming DNS for the WalletConnect SDK at esm.sh. The SDK is
       now self-hosted at /static/wc-bundle.js (17 KB, single Rollup bundle,
       served same-origin) so the preconnect is wasted preflight traffic and
       creates an unused third-party origin in the browser's connection pool. -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Self-hosted Tailwind CSS replaces the prior JIT-compiler runtime
       (https://cdn.tailwindcss.com?plugins=typography). The JIT was a
       multi-MB runtime loader evaluating CSS rules in every browser AND
       an XSS surface if cdn.tailwindcss.com were ever compromised. The
       static bundle at /static/tailwind.css is produced by
       `cmd/buildtailwindcss` from internal/ui/tailwind.config.cjs +
       the template content glob; tree-shaken so only used rules ship.
       v23.5: bumped ?v=21 → ?v=22 to force the browser to re-fetch the
       static bundle in case any future deploy invalidates it; happens in
       lock-step with the wallet.js / wc-bundle.js buster bump below. -->
  <link rel="stylesheet" href="/static/tailwind.css?v=31">

  <!-- ── Self-hosted JS libraries (htmx, ethers, alpinejs, walletconnect) ──
       Previously these were loaded from public CDNs with SHA-384 SRI
       integrity pinning. That scheme was brittle: any missed hash refresh
       made the browser fail-closed and reject the script — rendering the
       entire UI inert (no Alpine reactivity, no ethers contract calls,
       no SSE). Self-hosting eliminates the operational hazard: the bytes
       are committed to the repo, same-origin CSP allows them, and a
       CDN-side compromise can no longer affect us.
       v23.5 — WalletConnect's ethereum-provider is ALSO self-hosted as
       /static/wc-bundle.js (17 KB single Rollup/Terser bundle). It used
       to be a dynamic import() from esm.sh that re-routed into ~422
       nested sub-fetches any one of which, if blocked by the user's
       network (corp firewall, ISP geo-fence, ad-blocker), would silence
       the whole connect path. Now a single same-origin fetch on click.
       See wallet.js's `_wcConnect()` for the dynamic import. -->
  <!-- v23.5: ?v=21 → ?v=22 cache-buster bump. Forces the browser to
       re-fetch every same-origin static JS bundle in lock-step with
       the wc-bundle.js + wallet.js edits. Without this bump, a browser
       that loaded ?v=21 wallet.js would still call the v23.4 cascade
       (esm.sh rejected silently) even after v23.5 deployed — the cache
       buster is the belt against the entire "browser is using stale
       wallet.js" failure class. -->
  <!-- v23.6: ?v=22 → ?v=23 cache-buster bump. Forces the browser to
       re-fetch every same-origin static JS bundle in lock-step with
       the wc-bundle.js + wallet.js edits       so the new UMD SDK is loaded
       atomically. v=23 is the same buster as the earlier documented
       versions (v=21 was v23.4, v=22 was v23.5) — each release bumps
       every tag. A browser that pulled ?v=22 wallet.js would still
       call the broken dynamic-import path; now they all move together. -->
       <!-- v24.0.1: v=23 → v=28 bumped by the chain-metadata wiring patch — wallet.js now references the server-injected NATIVE_CURRENCY constant, so the bundled JS has to refetch even though the byte-level diff is small. -->
  <!-- v23.7: ?v=23 → ?v=24 cache-buster bump. The wc_qr_overlay fix +
       wallet.js telemetry changes only affect script-side behavior;
       the cache buster forces every browser to atomically re-fetch
       wc-bundle.js + wallet.js + the partial so the fix and the
       evidence-logging land together. Other tags (htmx/sse/ethers/
       tailwind/qrcode/cdn) bumped in lock-step for consistency,
       even though their bytes are unchanged. -->
  <!-- v23.8: ?v=24 → ?v=25 cache-buster bump. The wallet.js bridge
       (window.MW_CONNECT_WALLET global) + the @click handler swaps at
       layout.html:224,398 + offers.html:26 are wholly script-side. The
       bump forces an atomic re-fetch so a returning browser doesn't
       serve the v23.7 wallet.js (which still has the broken $store.wallet
       .connect() AST path) along with the v23.8 inline handler bound to
       window.MW_CONNECT_WALLET() at parse time — those two would mismatch
       and the click would no-op.
       Other tags bumped in lock-step for hygiene. The bridge itself
       bypasses Alpine's reactive effect when invoking .connect() so it
       is not subject to the v23.7 silent-drop symptom. -->
  <!-- v23.9: ?v=25 → ?v=26 cache-buster bump. Migration to NATIVE HTML
       onclick on the 3 connect buttons (layout.html desktop + mobile
       drawer + offers.html line 26) + HOIST of window.MW_CONNECT_WALLET
       bridge OUT of alpine:init to a top-level IIFE statement in
       wallet.js. The native onclick attribute bypasses Alpine's event
       directive parser entirely (no reactive-effect involvement, no
       proxy-stripped async-method silent drop); the top-level bridge
       registration guarantees window.MW_CONNECT_WALLET exists the
       moment wallet.js parses, before any click can fire. Combined
       belt-and-braces against the v23.7/v23.8 intermittent
       modal-doesn't-open failure mode. -->
  <!-- v24.0: ?v=26 → ?v=27 cache-buster bump so returning browsers
       receive the v24.0 wallet.js bytes (kind ReferenceError fix +
       chains:[1]+optionalChains:[114] + overlay init buffered-event
       recovery); without this bump browsers would still serve the
       v23.9 wallet.js from their disk cache despite the server having
       the new bytes. The three root-cause fixes for the 'shouldnt just
       rendera qr code' complaint:
         (a) DROP DEAD `kind` REFERENCE — connect({silent}) post-pair
             block was using `kind === 'walletconnect'` after v23.2
             removed the `kind` parameter, throwing ReferenceError on
             every successful pair. Both `kind` references removed;
             the disconnect-event listener now registers unconditionally;
             the success toast collapses to a single 'Connected via
             WalletConnect' message.
         (b) chains:[CHAIN_ID] → chains:[1] + optionalChains:[CHAIN_ID]
             — Coston2 (chain 114) is not in the default supported set
             of MetaMask/Trust/Rainbow/Ledger/Trezor so scanners were
             silently rejecting the QR. Declaring mainnet as the
             required primary chain means every mainstream wallet can
             pair first; the existing chainId-mismatch toast at line
             ~656 then guides the user to switch networks in their
             wallet and re-pair via QR. The added `1:` rpcMap entry
             was reverted in the same commit (kept small surface —
             the SDK uses its own defaults and the wallet does not
             perform chain-1 reads during the brief relay phase).
         (c) OVERLAY INIT BUFFERED-EVENT RECOVERY — the v23.9 hoisted
             bridge fires window.MW_CONNECT_WALLET() the moment
             wallet.js parses, so a click landing <50ms after document
             ready can dispatch `mw-wc-show` BEFORE Alpine finishes
             hydrating the overlay's init() listener registration.
             Without buffer recovery, those events go into the void
             and the modal stays hidden. The init() check now reads
             window.MW_WC_URI + wallet store state, renders the QR
             from cache if both are non-idle, and otherwise opens the
             spinner so the user sees progress. -->
  <script src="/static/htmx.min.js?v=31" defer></script>
  <script src="/static/sse.js?v=31" defer></script>
  <script src="/static/ethers.umd.min.js?v=31" defer></script>
  <script>
    // Server-injected runtime config (single source of truth: backend env).
    // These globals are READ by wallet.js at alpine:init time. NEVER hardcode.
    window.MW_MARKETPLACE   = '{{.MarketplaceAddr}}';
    window.MW_AUCTION       = '{{.AuctionAddr}}';
    window.MW_OFFERBOOK     = '{{.OfferBookAddr}}';
    window.MW_WC_PROJECT_ID = '{{.WCProjectID}}';
    // Chain-metadata block — v24.0 walletconnect config (chainId+name+currency
    // +rpcUrl+explorerUrl). {{.NetworkName}} / {{.NativeCurrency}} /
    // {{.ExplorerURL}} / {{.ChainID}} are server-injected from
    // config.C.{NetworkName,NativeCurrency,ExplorerURL,ChainID} by
    // cmd/server/ui.go render() so a single .env change re-skins the
    // entire frontend (coston2 today, mainnet tomorrow). The previous
    // 4 hardcoded literals used the same values — keep that as the
    // fallback constant below in case the host injection misses a key.
    window.MW_NETWORK_NAME    = '{{.NetworkName}}';
    window.MW_NETWORK_ID      = {{.ChainID}};
    window.MW_RPC_URL         = '{{.RPCURL}}';
    window.MW_EXPLORER        = '{{.ExplorerURL}}';
    window.MW_NATIVE_CURRENCY = '{{.NativeCurrency}}';
    // v23.3 — retry-image ingest helper. The /api/v1/img/retry endpoint
    // self-hosts an upstream image_uri into /api/v1/img/<sha> on success.
    // Used by every listing/auction/token/picker retry button so the
    // endpoint path is canonically typed in one place. Wraps prevent+stop
    // because the buttons live inside <a href="/token/..."> cards.
    window.MW_RETRY_IMAGE = function (coll, id, evt) {
      if (evt) { try { evt.preventDefault(); evt.stopPropagation(); } catch (_) {} }
      if (!coll || !id) return;
      fetch('/api/v1/img/retry?coll=' + encodeURIComponent(coll) + '&id=' + encodeURIComponent(id), { method: 'POST' })
        .finally(function () { location.reload(); });
    };
  </script>
  <!-- wallet.js MUST load before Alpine: it registers the $store.wallet on
       alpine:init, which fires the moment Alpine executes. Deferred scripts
       run in document order — Alpine first would fire the event before the
       listener exists and every wallet UI element silently disappears. -->
  <!-- v23.6 — Self-hosted 1.8 MB UMD WalletConnect SDK. MUST load BEFORE
       wallet.js so the global namespace is populated synchronously when
       wallet.js evaluates. Both use `defer`, and deferred scripts execute
       in document order, so by the time wallet.js runs the `defer`-drain
       block runs wc-bundle.js FIRST, exposes
       `window["@walletconnect/ethereum-provider"]`, then wallet.js reads
       that namespace in `_wcConnect()` without any race.

       1.8 MB is the cost of true network-agnostic bootstrapping. The
       earlier CDN cascade (v23.3-v23.5) failed because esm.sh `bundle-deps`
       and jsdelivr `+esm` are META bundles whose first import statement
       references a relative path the browser resolves against the page
       origin, producing 404s and RangeErrors. The shipping UMD bundle
       is Rollup v2.79.2 + Terser v5.39.0 built once by jsdelivr from the
       package's published `dist/index.umd.js` (the same file the
       package's `unpkg` field points to) — ZERO internal imports,
       leaves a single global. attach to flash disk on every page load:
       the performance cost is real but is the cheapest mitigation against
       the entire "CDN-dependent SDK" failure class. Unique per release:
       the cache-buster `?v=23` is bumped in lock-step with wallet.js so
       atomic re-fetch. -->      <script src="/static/wc-bundle.js?v=31" defer></script>      <script src="/static/wallet.js?v=31" defer></script>
  <script src="/static/cdn.min.js?v=31" defer></script>
  <style>
    [x-cloak]{display:none !important;}
    body { font-family: 'Inter', system-ui, sans-serif; background: #09090b; color: #fafafa; -webkit-font-smoothing: antialiased; }
    code, .font-mono { font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace; }
    /* ── Scrollbar style: matches the 5-color palette (sky thumb on ink track) ── */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.04); }
    ::-webkit-scrollbar-thumb { background: linear-gradient(135deg,#7dd3fc,#a78bfa); border-radius: 999px; border: 2px solid transparent; background-clip: padding-box; }
    ::-webkit-scrollbar-thumb:hover { background: linear-gradient(135deg,#0ea5e9,#7c3aed); background-clip: padding-box; }
    * { scrollbar-width: thin; scrollbar-color: #7dd3fc rgba(255,255,255,0.05); }

    .shimmer { background: linear-gradient(90deg, transparent 0%, rgba(125,211,252,0.08) 50%, transparent 100%); background-size: 200% 100%; animation: shimmer 2s infinite; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .glass-dark  { background: rgba(10,10,13,0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
    .glass-soft  { background: rgba(15,15,20,0.55); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
    .glow-sky     { box-shadow: 0 0 22px -6px rgba(56,189,248,0.45); }
    .glow-gold    { box-shadow: 0 0 22px -6px rgba(251,191,36,0.50); }
    .glow-violet  { box-shadow: 0 0 22px -6px rgba(167,139,250,0.45); }
    .glow-white   { box-shadow: 0 0 18px -4px rgba(255,255,255,0.55); }
    .glow-sky-strong  { box-shadow: 0 0 30px -4px rgba(56,189,248,0.65), 0 0 8px -1px rgba(56,189,248,0.85); }
    .glow-gold-strong { box-shadow: 0 0 30px -4px rgba(252,211,77,0.65), 0 0 8px -1px rgba(252,211,77,0.85); }
    .btn-sky     { background-image: linear-gradient(135deg,#7dd3fc,#0ea5e9); }
    .btn-gold    { background-image: linear-gradient(135deg,#fcd34d,#f59e0b); }
    .btn-violet  { background-image: linear-gradient(135deg,#a78bfa,#7c3aed); }
    .btn-white   { background: #ffffff; color: #0a0a0d; }
    .btn-disabled { background-image: linear-gradient(135deg, rgba(125,211,252,0.25), rgba(14,165,233,0.25)) !important; cursor: not-allowed; }
    .ring-focus:focus-visible { outline: 2px solid #7dd3fc; outline-offset: 2px; }
    .brand-text { background-image: linear-gradient(90deg, #7dd3fc, #fcd34d, #c4b5fd, #7dd3fc); background-size: 200% auto; -webkit-background-clip: text; background-clip: text; color: transparent; animation: gradient 5s ease infinite; }
    @keyframes gradient { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
    .step-current { animation: step-pulse 1.6s ease-in-out infinite; }
    @keyframes step-pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(125,211,252,0.6); } 50% { box-shadow: 0 0 0 8px rgba(125,211,252,0.0); } }
    .step-current-gold { animation: step-pulse-gold 1.6s ease-in-out infinite; }
    @keyframes step-pulse-gold { 0%,100% { box-shadow: 0 0 0 0 rgba(252,211,77,0.6); } 50% { box-shadow: 0 0 0 8px rgba(252,211,77,0.0); } }
    .step-current-violet { animation: step-pulse-violet 1.6s ease-in-out infinite; }
    @keyframes step-pulse-violet { 0%,100% { box-shadow: 0 0 0 0 rgba(167,139,250,0.6); } 50% { box-shadow: 0 0 0 8px rgba(167,139,250,0.0); } }
    .pill-pulse-pulse::after { content: ""; position: absolute; inset: -3px; border-radius: 9999px; background: rgba(125,211,252,0.35); z-index: -1; animation: pill-pulse 1.5s ease-out infinite; }
    @keyframes pill-pulse { 0% { transform: scale(0.6); opacity: 0.7; } 100% { transform: scale(1.4); opacity: 0; } }
    /* Stripe gradient: drives the showcase section card. */
    .stripe-gradient { background: linear-gradient(90deg, #7dd3fc 0%, #fcd34d 40%, #c4b5fd 80%, #ffffff 100%); }
    /* WC pairing-chip pulse — softer than the connected-state pill so they don't compete. */
    .pulse-violet { animation: pulse-violet 1.8s ease-in-out infinite; }
    @keyframes pulse-violet { 0%,100% { box-shadow: 0 0 0 0 rgba(167,139,250,0.0); } 50% { box-shadow: 0 0 0 6px rgba(167,139,250,0.18); } }
    .anti-snipe-flash { animation: anti-snipe 0.6s ease-in-out infinite alternate; }
    @keyframes anti-snipe { from { box-shadow: 0 0 0 0 rgba(56,189,248,0.0); } to { box-shadow: 0 0 16px -4px rgba(56,189,248,0.6); } }
    .lift-cta { transition: transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s ease; }
    .lift-cta:hover { transform: translateY(-2px) scale(1.01); }
    .spin-svg { animation: spin-svg 1s linear infinite; }
    @keyframes spin-svg { to { transform: rotate(360deg); } }
    .fade-in { animation: fade-in 0.4s ease both; }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    .progress-bar { height: 3px; border-radius: 999px; transition: width 280ms ease, background-color 280ms ease; background: linear-gradient(90deg, #7dd3fc, #fcd34d, #c4b5fd); }
  </style>
</head>
<body hx-ext="sse" sse-connect="/events" x-data>

<!-- Nav -->
<!-- v23.2 — only `open` (mobile drawer) remains. The v22-era `wcOpen`
     + `helpersOpen` flags drove the dropdown picker, which collapsed to
     a single WC button (no dropdown surface). Keeping the dead flags
     would invite future readers to chase them as live state. -->
<nav x-data="{ open: false }" class="sticky top-0 z-50 glass-dark border-b border-white/10 shadow-topbar">
  <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-16">    <a href="/" class="text-xl font-extrabold tracking-tight flex-shrink-0 flex items-center gap-2.5 group">
      <span class="w-9 h-9 rounded-xl btn-sky flex items-center justify-center text-ink-950 text-lg glow-sky transition group-hover:scale-105">✦</span>
      <span class="text-white">Magic<span class="brand-text">Webb</span></span>
    </a>

    <!-- Desktop links -->
    <div class="hidden md:flex items-center gap-1 text-sm font-semibold">
      <a href="/"             class="px-3 py-1.5 rounded-lg text-white/80 hover:text-white hover:bg-white/5 transition">Home</a>
      <a href="/listings"     class="px-3 py-1.5 rounded-lg text-sky-200 hover:text-white hover:bg-sky-500/15 transition">Listings</a>
      <a href="/auctions"     class="px-3 py-1.5 rounded-lg text-violet-200 hover:text-white hover:bg-violet-500/15 transition">Auctions</a>
      <a :href="$store.wallet.address ? '/offers?addr=' + $store.wallet.address : '/offers'" class="px-3 py-1.5 rounded-lg text-gold-200 hover:text-white hover:bg-gold-500/15 transition">Offers</a>
      <a href="/search"       class="px-3 py-1.5 rounded-lg text-white/80 hover:text-white hover:bg-white/5 transition">Search</a>
      <a href="/metrics"      class="px-3 py-1.5 rounded-lg text-white/80 hover:text-white hover:bg-white/5 transition">Metrics</a>
      <a href="/docs"         class="px-3 py-1.5 rounded-lg text-white/80 hover:text-white hover:bg-white/5 transition">Docs</a>
    </div>

    <!-- Right: wallet + bell + WC pairing chip + hamburger -->
    <div class="flex items-center gap-2">
      <!-- Connect Wallet — v23.2 single-button WalletConnect path.
           The previous v9-v22 picker dropdown collapsed a Browser Wallet
           entry (MetaMask/Rabby) + a WalletConnect entry. v23.2 strips
           the MetaMask/injected path entirely per user request, so the
           navbar now exposes ONE call-to-action that opens the WC QR
           overlay directly. `hidden md:block` provides DOM-permanent
           visibility (per the v16 robustness fix): if Alpine fails to
           evaluate the wallet store on first paint (e.g. wallet.js
           crashed with a SyntaxError), the button is still visible —
           operators see the symptom and can fix upstream, but users
           on a healthy build get the same button instantly.
      -->
      <div x-show="!$store.wallet.connected && !$store.wallet.hasSavedWallet"
           class="relative hidden md:block">
        <button type="button"
                onclick="window.MW_CONNECT_WALLET()"
                title="Connect via WalletConnect — scan QR or deep-link from any mobile or hardware wallet"
                aria-label="Connect Wallet"
                class="px-5 py-2 rounded-xl bg-violet-btn hover:opacity-95 text-white font-extrabold text-sm transition glow-violet active:scale-[0.97] flex items-center gap-2 ring-focus"
                {{if not .WCProjectID}}disabled{{end}}>
          <span class="text-base leading-none text-violet-100">⌬</span>
          <span>Connect Wallet</span>
        </button>
      </div>

      <!-- Notification bell -->
      <template x-if="$store.wallet.connected">
        <div class="relative" x-data="{ openBell: false, items: [], loading: false,
              async load() {
                this.loading = true;
                try {
                  const res = await fetch('/api/v1/notifications?limit=20', { headers: $store.wallet.authHeaders() });
                  if (res.ok) { this.items = (await res.json()).notifications || []; }
                } catch {}
                this.loading = false;
                $store.wallet.markNotificationsRead();
              } }">
          <button @click="openBell = !openBell; if (openBell) load()"
                  class="relative p-2 rounded-lg text-white/80 hover:text-white hover:bg-white/10 transition ring-focus" aria-label="Notifications">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.4-1.4A2 2 0 0118 14.2V11a6 6 0 10-12 0v3.2c0 .5-.2 1-.6 1.4L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
            <span x-show="$store.wallet.unread > 0" x-cloak
                  class="absolute -top-0.5 -right-0.5 min-w-[18px] h-[18px] px-1 rounded-full btn-gold text-ink-950 text-[10px] font-extrabold flex items-center justify-center glow-gold"
                  x-text="$store.wallet.unread > 99 ? '99+' : $store.wallet.unread"></span>
          </button>
          <div x-show="openBell" x-cloak style="display: none;"
               @click.outside="if (openBell) openBell = false"
               @keydown.escape.window="if (openBell) openBell = false"
               class="absolute right-0 mt-2 w-80 max-w-[90vw] bg-ink-900/95 border border-white/10 rounded-2xl shadow-2xl overflow-hidden z-50 backdrop-blur">
            <div class="px-4 py-2 border-b border-white/10 text-xs font-bold text-white/60 uppercase tracking-wider">Notifications</div>
            <div class="max-h-96 overflow-y-auto divide-y divide-white/5">
              <template x-if="loading"><div class="px-4 py-6 text-center text-xs text-white/40 shimmer">Loading…</div></template>
              <template x-if="!loading && items.length === 0"><div class="px-4 py-6 text-center text-xs text-white/40">No notifications yet.</div></template>
              <template x-for="n in items" :key="n.id">
                <a :href="n.link || '#'" class="block px-4 py-3 hover:bg-white/5 transition">
                  <p class="text-sm text-white" x-text="n.title"></p>
                  <p class="text-xs text-white/60 mt-0.5" x-text="n.body"></p>
                </a>
              </template>
            </div>
          </div>
        </div>
      </template>

      <!-- Connected pill: identity + WC badge + disconnect. The explicit
           "Wallet" label + title tooltip makes this unmistakable as
           the wallet control — even if the user landed via auto-reconnect
           on page boot, the pill now reads as "Wallet 0x1234…abcd" rather
           than just a tiny address + × they might not recognize. -->
      <template x-if="$store.wallet.connected">
        <div class="flex items-center gap-2 px-2.5 py-1.5 rounded-xl bg-white/5 hover:bg-white/10 transition ring-focus border border-white/10"
             title="Your connected wallet">
          <div class="relative w-2 h-2 rounded-full bg-sky-300 pill-pulse-pulse"></div>
          <!-- md+: visible above the hamburger-hidden breakpoint so
               the right-side cluster (pill + bell + WC chip) has slack.
               Below md, the hamburger drawer exposes the wallet control
               with full width instead. -->
          <span class="text-[10px] uppercase tracking-wider text-white/40 font-extrabold">Wallet</span>
          <template x-if="$store.wallet.isWalletConnect">
            <span class="text-[9px] px-1.5 py-0.5 rounded bg-violet-500/20 text-violet-200 font-extrabold uppercase tracking-wider border border-violet-400/30" title="Connected via WalletConnect">WC</span>
          </template>
          <a :href="'/profile/' + $store.wallet.address" class="text-xs text-white hover:text-gold-200 font-mono font-bold"
             x-text="$store.wallet.shortAddr"></a>
          <button @click="$store.wallet.disconnect()"
                  title="Disconnect wallet"
                  class="text-white/40 hover:text-gold-300 text-base leading-none transition">×</button>
        </div>
      </template>

      <!-- Saved-wallet pill (v13): surfaces a previously-connected wallet
           in DISPLAY state with explicit Reconnect / Forget affordances.
           Auto-reconnect on page load was removed (user-visible
           MetaMask popup without consent → "Tries to connect to my
           MetaMask wallet automatically" complaint). The Reconnect
           button calls connect() with silent:false so the user sees
           the standard MetaMask prompt; the × button forgets the saved
           entry. The pill is visually distinct from the connected pill
           (amber accent vs. sky accent) so the user can tell at a
           glance whether they have a LIVE session or just a saved one. -->
      <template x-if="$store.wallet.hasSavedWallet && !$store.wallet.connected">
        <div class="flex items-center gap-2 px-2.5 py-1.5 rounded-xl bg-ink-900/80 border border-amber-400/30 hover:border-amber-400/60 transition ring-focus"
             title="A wallet was previously connected on this device. Click Reconnect to sign in again.">
          <div class="relative w-2 h-2 rounded-full bg-amber-400"></div>
          <span class="text-[10px] uppercase tracking-wider text-amber-200 font-extrabold">Saved</span>
          <span class="text-xs text-white font-mono font-bold" x-text="$store.wallet.shortSavedAddr"></span>
          <template x-if="$store.wallet.savedKind === 'walletconnect'">
            <span class="text-[9px] px-1.5 py-0.5 rounded bg-violet-500/20 text-violet-200 font-extrabold uppercase tracking-wider border border-violet-400/30">WC</span>
          </template>
          <button @click="$store.wallet.reconnectSaved()"
                  class="ml-1.5 px-2 py-0.5 rounded-lg btn-sky text-ink-950 text-[10px] font-extrabold uppercase tracking-wider ring-focus active:scale-[0.97]"
                  title="Reconnect to your previously-saved wallet"
                  x-text="$store.wallet.savedKind === 'walletconnect' ? 'Re-pair via QR' : 'Reconnect'">Reconnect</button>
          <button @click="$store.wallet.forgetSaved()"
                  title="Forget saved wallet — use a different one next time"
                  class="text-white/40 hover:text-white text-base leading-none transition ml-0.5">&times;</button>
        </div>
      </template>

      <button @click="open = !open" class="md:hidden p-2 rounded-lg text-white/80 hover:text-white hover:bg-white/10 transition ring-focus" aria-label="Menu">
        <svg x-show="!open" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        <svg x-show="open" x-cloak class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
  </div>

  <!-- Mobile menu.
       Includes a wallet control surface INSIDE the drawer so on small
       viewports the user has a wide, uncluttered Connect Wallet button
       that opens the Browser Wallet / WalletConnect picker without the
       cramped 80-wide dropdown clipping at the edge of the desktop
       navbar (the previous "wallet button not visible" complaint).
       Controls mirror the desktop navbar behaviour via $store.wallet
       so state stays consistent regardless of entry point. -->
  <div x-show="open" x-cloak style="display: none;"
       @click.outside.window="if (open) open = false"
       @keydown.escape.window="if (open) open = false"
       class="md:hidden border-t border-white/10 px-4 py-3 space-y-1.5 text-sm">
    <a href="/"          class="block py-2 px-3 rounded-lg text-white/80 hover:text-white hover:bg-white/10 transition">Home</a>
    <a href="/listings"  class="block py-2 px-3 rounded-lg text-sky-200 hover:bg-sky-500/15 transition">Listings</a>
    <a href="/auctions"  class="block py-2 px-3 rounded-lg text-violet-200 hover:bg-violet-500/15 transition">Auctions</a>
    <a :href="$store.wallet.address ? '/offers?addr=' + $store.wallet.address : '/offers'" class="block py-2 px-3 rounded-lg text-gold-200 hover:bg-gold-500/15 transition">Offers</a>
    <a href="/search"    class="block py-2 px-3 rounded-lg text-white/80 hover:text-white hover:bg-white/10 transition">Search</a>
    <a href="/metrics"   class="block py-2 px-3 rounded-lg text-white/80 hover:text-white hover:bg-white/10 transition">Metrics</a>
    <a href="/docs"      class="block py-2 px-3 rounded-lg text-white/80 hover:text-white hover:bg-white/10 transition">Docs</a>

    <!-- Mobile wallet section: always present in the drawer; the inner
         controls are conditional on the same $store.wallet that drives
         the desktop navbar so reconnects/disconnects stay in sync.
         v13 also exposes the saved-wallet pill here so a mobile user
         who previously connected via WalletConnect can Re-pair with
         a single tap from the drawer (the desktop navbar pill is
         hidden below md to keep the navbar uncluttered). -->
    <div class="pt-3 mt-2 border-t border-white/10 space-y-2">
      <p class="px-3 text-[10px] uppercase tracking-wider text-white/40 font-extrabold">Wallet</p>
      <template x-if="$store.wallet.hasSavedWallet && !$store.wallet.connected">
        <div class="px-3 py-2.5 rounded-xl bg-ink-900/80 border border-amber-400/30 space-y-2">
          <div class="flex items-center gap-2">
            <div class="w-2 h-2 rounded-full bg-amber-400"></div>
            <span class="text-[10px] uppercase tracking-wider text-amber-200 font-extrabold">Saved wallet</span>
            <span class="text-xs text-white font-mono font-bold flex-1 truncate" x-text="$store.wallet.shortSavedAddr"></span>
            <button type="button"
                    @click.stop="$store.wallet.forgetSaved()"
                    aria-label="Forget saved wallet"
                    class="text-white/40 hover:text-white text-base leading-none px-2 py-1 rounded-md hover:bg-white/10 transition cursor-pointer"
                    title="Forget saved wallet">&times;</button>
          </div>
          <button type="button"
                  @click="$store.wallet.reconnectSaved(); open = false"
                  class="w-full text-left px-3 py-2.5 rounded-xl btn-sky text-ink-950 font-extrabold flex items-center gap-3 glow-sky active:scale-[0.97] transition cursor-pointer"
                  x-text="$store.wallet.savedKind === 'walletconnect' ? 'Re-pair via QR' : 'Reconnect wallet'">Reconnect wallet</button>
        </div>
      </template>
      <div x-show="!$store.wallet.connected && !$store.wallet.hasSavedWallet" class="space-y-2">
        <button type="button"
                onclick="window.MW_CONNECT_WALLET(); open = false"
                class="w-full text-left px-3 py-3 rounded-xl bg-violet-btn text-white font-extrabold flex items-center gap-3 glow-violet shadow-lg shadow-violet-500/30 transition active:scale-[0.97] cursor-pointer"
                {{if not .WCProjectID}}disabled{{end}}>
          <span class="w-9 h-9 rounded-lg bg-white/15 flex items-center justify-center text-base">⌬</span>
          <span class="flex-1 min-w-0">
            <span class="block text-sm font-extrabold">Connect Wallet</span>
            <span class="block text-[10px] font-bold opacity-80">WalletConnect · QR or deep link</span>
          </span>
          <span class="text-[10px] px-2 py-0.5 rounded-full bg-white/15 font-bold uppercase tracking-wider">QR</span>
        </button>
      </div>
      <template x-if="$store.wallet.connected">
        <div class="space-y-2">
          <a :href="'/profile/' + $store.wallet.address"
             class="flex items-center gap-2.5 px-3 py-2.5 rounded-xl bg-white/5 border border-white/10"
             title="Your connected wallet">
            <span class="w-2 h-2 rounded-full bg-sky-300 pill-pulse-pulse"></span>
            <span class="text-[10px] uppercase tracking-wider text-white/40 font-extrabold">Wallet</span>
            <span class="text-xs text-white font-mono font-bold flex-1 truncate"
                  x-text="$store.wallet.shortAddr"></span>
            <template x-if="$store.wallet.isWalletConnect">
              <span class="text-[9px] px-1.5 py-0.5 rounded bg-violet-500/20 text-violet-200 font-extrabold uppercase tracking-wider border border-violet-400/30">WC</span>
            </template>
          </a>
          <button type="button"
                  @click="$store.wallet.disconnect()"
                  class="w-full text-left px-3 py-2.5 rounded-xl border border-red-400/30 text-red-200 hover:bg-red-500/10 transition font-bold text-sm cursor-pointer">
            Disconnect Wallet
          </button>
        </div>
      </template>
    </div>
  </div>
</nav>

<!-- Toast container -->
<div id="toasts" class="fixed bottom-4 right-4 z-[55] flex flex-col gap-2 pointer-events-none" aria-live="polite"></div>

<!-- SSE bump + live-refresh wiring.
     Per-page `[data-live]` containers now carry their own `hx-get` +
     `hx-trigger` (SSE + 1s polling + ![document.hidden] guard), so the
     whole-page reload below was retired. The SSE bump stays so the
     notification-bell unread counter still runs on every event. -->
<script>
  (() => {
    document.body.addEventListener('htmx:sseMessage', () => {
      window.dispatchEvent(new Event('mw-notification'));
    });
  })();
</script>

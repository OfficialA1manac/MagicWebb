{{template "layout.html" .}}
{{define "content"}}
<div x-data="stalledDashboard()" x-init="init()" class="mb-8">
  <!-- Header -->
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight text-white flex items-center gap-3">
        <span class="w-11 h-11 rounded-2xl bg-rose-500/15 flex items-center justify-center text-rose-300 glow-sky">⚠</span>
        Stalled Auctions
      </h1>
      <p class="text-sm text-white/40 mt-1">Auctions requiring admin attention — expired, inactive, or unrefunded.</p>
    </div>
    <div class="flex items-center gap-2">
      <span class="text-[10px] text-white/30 font-mono" x-text="'Last updated: ' + lastUpdated"></span>
      <button @click="refresh()" class="px-3 py-1.5 rounded-lg bg-white/5 hover:bg-white/10 text-white/60 hover:text-white text-xs font-bold transition flex items-center gap-1.5 ring-focus">
        <span :class="{ 'spin-svg': loading }" class="inline-block">↻</span>
        Refresh
      </button>
    </div>
  </div>

  <!-- Loading / Error / Empty states -->
  <template x-if="loading && !error">
    <div class="bg-ink-900/80 backdrop-blur rounded-2xl p-12 border border-white/10 text-center shimmer">
      <p class="text-white/40">Loading stalled auction data…</p>
    </div>
  </template>
  <template x-if="error">
    <div class="bg-red-500/10 border border-red-400/30 rounded-xl px-4 py-3 mb-6 text-sm text-red-200 flex items-center gap-2">
      <span>⚠</span>
      <span x-text="error"></span>
    </div>
  </template>
  <template x-if="!loading && !error && totalCount === 0">
    <div class="bg-emerald-500/10 border border-emerald-400/30 rounded-2xl px-6 py-12 text-center">
      <p class="text-emerald-200 font-bold text-lg mb-1">All Clear ✦</p>
      <p class="text-emerald-300/60 text-sm">No stalled auctions at this time.</p>
    </div>
  </template>

  <template x-if="!loading && counts">
    <!-- Count cards -->
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
      <div class="bg-ink-900/80 backdrop-blur rounded-2xl p-5 border border-rose-400/30 hover:border-rose-300/50 transition group">
        <div class="flex items-center gap-2 mb-3">
          <span class="w-8 h-8 rounded-lg bg-rose-500/15 flex items-center justify-center text-rose-300 text-sm">⌛</span>
          <p class="text-[10px] text-white/40 uppercase tracking-wider font-extrabold">Expired &amp; Unsettled</p>
        </div>
        <p class="text-3xl font-black text-rose-200 tracking-tight" x-text="counts.expiredUnsettled">0</p>
        <p class="text-[10px] text-rose-300/40 mt-1">Auctions past endsAt that haven't been settled</p>
      </div>
      <div class="bg-ink-900/80 backdrop-blur rounded-2xl p-5 border border-gold-400/30 hover:border-gold-300/50 transition group">
        <div class="flex items-center gap-2 mb-3">
          <span class="w-8 h-8 rounded-lg bg-gold-500/15 flex items-center justify-center text-gold-300 text-sm">◻</span>
          <p class="text-[10px] text-white/40 uppercase tracking-wider font-extrabold">Inactive (No Bids)</p>
        </div>
        <p class="text-3xl font-black text-gold-200 tracking-tight" x-text="counts.inactiveNoBids">0</p>
        <p class="text-[10px] text-gold-300/40 mt-1">Live auctions with no qualifying bids</p>
      </div>
      <div class="bg-ink-900/80 backdrop-blur rounded-2xl p-5 border border-violet-400/30 hover:border-violet-300/50 transition group">
        <div class="flex items-center gap-2 mb-3">
          <span class="w-8 h-8 rounded-lg bg-violet-500/15 flex items-center justify-center text-violet-300 text-sm">↩</span>
          <p class="text-[10px] text-white/40 uppercase tracking-wider font-extrabold">Unrefunded Losers</p>
        </div>
        <p class="text-3xl font-black text-violet-200 tracking-tight" x-text="counts.unrefunded">0</p>
        <p class="text-[10px] text-violet-300/40 mt-1">Settled auctions with outstanding loser refunds</p>
      </div>
    </div>

    <!-- Stall reason summary bar (visual gauge) -->
    <div class="bg-ink-900/80 backdrop-blur rounded-2xl p-5 border border-white/10 mb-8">
      <h3 class="text-sm font-extrabold text-white/60 uppercase tracking-wider mb-4 flex items-center gap-2">
        <span class="w-5 h-5 rounded bg-rose-500/20 flex items-center justify-center text-rose-300 text-[10px]">▤</span>
        Breakdown
      </h3>
      <div class="space-y-3">
        <div>
          <div class="flex justify-between text-xs mb-1">
            <span class="text-rose-200 font-bold">Expired Unsettled</span>
            <span class="text-white/60 font-mono" x-text="counts.expiredUnsettled + ' / ' + totalCount"></span>
          </div>
          <div class="h-2 rounded-full bg-ink-700 overflow-hidden">
            <div class="h-full rounded-full bg-gradient-to-r from-rose-400 to-rose-500 transition-all duration-700"
                 :style="'width: ' + (totalCount > 0 ? (counts.expiredUnsettled / totalCount * 100) : 0) + '%'"></div>
          </div>
        </div>
        <div>
          <div class="flex justify-between text-xs mb-1">
            <span class="text-gold-200 font-bold">Inactive No Bids</span>
            <span class="text-white/60 font-mono" x-text="counts.inactiveNoBids + ' / ' + totalCount"></span>
          </div>
          <div class="h-2 rounded-full bg-ink-700 overflow-hidden">
            <div class="h-full rounded-full bg-gradient-to-r from-gold-400 to-gold-500 transition-all duration-700"
                 :style="'width: ' + (totalCount > 0 ? (counts.inactiveNoBids / totalCount * 100) : 0) + '%'"></div>
          </div>
        </div>
        <div>
          <div class="flex justify-between text-xs mb-1">
            <span class="text-violet-200 font-bold">Unrefunded</span>
            <span class="text-white/60 font-mono" x-text="counts.unrefunded + ' / ' + totalCount"></span>
          </div>
          <div class="h-2 rounded-full bg-ink-700 overflow-hidden">
            <div class="h-full rounded-full bg-gradient-to-r from-violet-400 to-violet-500 transition-all duration-700"
                 :style="'width: ' + (totalCount > 0 ? (counts.unrefunded / totalCount * 100) : 0) + '%'"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Stalled auction rows table -->
    <div class="bg-ink-900/80 backdrop-blur rounded-2xl border border-white/10 overflow-hidden">
      <div class="px-5 py-4 border-b border-white/10 flex items-center justify-between">
        <h3 class="text-sm font-extrabold text-white/60 uppercase tracking-wider flex items-center gap-2">
          <span class="w-5 h-5 rounded bg-rose-500/20 flex items-center justify-center text-rose-300 text-[10px]">☰</span>
          Auction Details
        </h3>
        <span class="text-[10px] text-white/30 font-mono" x-text="rows.length + ' row' + (rows.length !== 1 ? 's' : '')"></span>
      </div>
      <div class="overflow-x-auto">
        <template x-if="rows.length === 0">
          <div class="px-5 py-8 text-center text-white/40 text-sm">No stalled auction rows.</div>
        </template>
        <template x-if="rows.length > 0">
          <table class="w-full text-sm">
            <thead>
              <tr class="text-[10px] uppercase tracking-wider text-white/40 font-extrabold border-b border-white/5">
                <th class="text-left px-4 py-3">ID</th>
                <th class="text-left px-4 py-3">Collection</th>
                <th class="text-left px-4 py-3">Token</th>
                <th class="text-left px-4 py-3">Stall Reason</th>
                <th class="text-right px-4 py-3">Winning Bid</th>
                <th class="text-right px-4 py-3">Ended At</th>
                <th class="text-right px-4 py-3">Actions</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-white/5">
              <template x-for="row in rows" :key="row.auction_id">
                <tr class="hover:bg-white/[0.02] transition">
                  <td class="px-4 py-3 font-mono text-xs text-white/80">
                    <a :href="'/auction/' + row.auction_id" class="hover:text-sky-200 transition"
                       x-text="'#' + row.auction_id"></a>
                  </td>
                  <td class="px-4 py-3 font-mono text-xs">
                    <a :href="'/collection/' + row.collection"
                       class="text-white/60 hover:text-sky-200 transition"
                       x-text="row.collection ? row.collection.slice(0, 6) + '…' + row.collection.slice(-4) : '-'"></a>
                  </td>
                  <td class="px-4 py-3 font-mono text-xs text-white/60" x-text="'#' + row.token_id"></td>
                  <td class="px-4 py-3">
                    <span class="px-2 py-0.5 rounded text-[10px] font-extrabold uppercase tracking-wider"
                          :class="stallBadgeClass(row.stall_reason)"
                          x-text="row.stall_reason || 'unknown'"></span>
                  </td>
                  <td class="px-4 py-3 text-right font-mono text-xs text-gold-200"
                      x-text="row.highest_bid_wei ? wei2flr(row.highest_bid_wei) + ' FLR' : '-'"></td>
                  <td class="px-4 py-3 text-right font-mono text-xs text-white/40"
                      x-text="row.ends_at ? fmtTime(row.ends_at) : '-'"></td>
                  <td class="px-4 py-3 text-right">
                    <a :href="'/auction/' + row.auction_id"
                       class="inline-block px-2.5 py-1 rounded-lg bg-white/5 hover:bg-white/10 text-white/60 hover:text-white text-[10px] font-bold transition ring-focus">
                      View →
                    </a>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </template>
      </div>
    </div>
  </template>
</div>

<script>
  function stalledDashboard() {
    return {
      loading: true,
      error: null,
      counts: null,
      rows: [],
      lastUpdated: '',
      autoRefreshTimer: null,

      get totalCount() {
        if (!this.counts) return 0;
        return (this.counts.expiredUnsettled || 0) + (this.counts.inactiveNoBids || 0) + (this.counts.unrefunded || 0);
      },

      init() {
        this.refresh();
        // Auto-refresh every 30 seconds
        var self = this;
        this.autoRefreshTimer = setInterval(function () { self.refresh(); }, 30000);
      },

      destroy() {
        if (this.autoRefreshTimer) {
          clearInterval(this.autoRefreshTimer);
          this.autoRefreshTimer = null;
        }
      },

      refresh() {
        var self = this;
        self.loading = true;
        self.error = null;

        // Build auth headers from the wallet store if connected
        var headers = { 'Content-Type': 'application/json' };
        if (window.Alpine && window.Alpine.store && window.Alpine.store('wallet')) {
          var ws = window.Alpine.store('wallet');
          if (ws.authHeaders) {
            var auth = ws.authHeaders();
            if (auth) {
              for (var k in auth) {
                if (auth.hasOwnProperty(k)) headers[k] = auth[k];
              }
            }
          }
        }

        fetch('/api/v1/admin/auctions/stalled', { headers: headers })
          .then(function (r) {
            if (r.status === 403) throw new Error('Access denied — admin only');
            if (r.status === 401) throw new Error('Authentication required — connect your wallet');
            if (!r.ok) throw new Error('Request failed (' + r.status + ')');
            return r.json();
          })
          .then(function (data) {
            self.counts = data.counts || {};
            self.rows = data.rows || [];
            self.lastUpdated = new Date().toLocaleTimeString();
            self.loading = false;
          })
          .catch(function (err) {
            self.error = err.message || 'Failed to load stalled auctions';
            self.loading = false;
          });
      },

      stallBadgeClass(reason) {
        if (!reason) return 'bg-white/5 text-white/60';
        if (reason.indexOf('expired') >= 0 || reason.indexOf('unsettled') >= 0)
          return 'bg-rose-500/15 text-rose-200 border border-rose-400/30';
        if (reason.indexOf('inactive') >= 0 || reason.indexOf('no_bids') >= 0 || reason.indexOf('no bids') >= 0)
          return 'bg-gold-500/15 text-gold-200 border border-gold-400/30';
        if (reason.indexOf('unrefunded') >= 0 || reason.indexOf('refund') >= 0)
          return 'bg-violet-500/15 text-violet-200 border border-violet-400/30';
        return 'bg-white/5 text-white/60';
      },

      wei2flr(wei) {
        if (!wei || wei === '0') return '0.00';
        // Copied from the server-side wei2flr: divide by 1e18, 4 decimals
        var val = parseFloat(wei) / 1e18;
        return val.toFixed(4);
      },

      fmtTime(isoStr) {
        if (!isoStr) return '-';
        try {
          var d = new Date(isoStr);
          return d.toLocaleString();
        } catch (e) {
          return isoStr;
        }
      }
    };
  }
</script>
{{end}}

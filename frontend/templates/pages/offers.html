{{template "layout.html" .}}
{{define "content"}}
<!-- Outer x-data = tab state. Static header + connect prompt live above.
     Live region swaps every 1s OR on offer-updated SSE. Alpine.initTree
     on after-swap re-applies x-show on the new node children so the
     active tab still gates the right offer list. -->
<div x-data="{
    tab: 'received',
    wsChannel: 'user:{{lower .Addr}}',
    wsSubscribed: false,
    init() {
      if (!this.wsChannel || this.wsChannel === 'user:') return;
      var self = this;
      var doSub = function () {
        if (window.MW_WS && window.MW_WS.subscribe) {
          window.MW_WS.subscribe([self.wsChannel]);
          self.wsSubscribed = true;
        }
      };
      if (window.MW_WS && window.MW_WS.connected) {
        doSub();
      } else {
        window.addEventListener('mw-ws-open', doSub, { once: true });
      }
      window.addEventListener('pagehide', function () {
        if (window.MW_WS && window.MW_WS.unsubscribe) {
          window.MW_WS.unsubscribe([self.wsChannel]);
          self.wsSubscribed = false;
        }
      }, { once: true });
    },
  }">
  <div class="flex flex-wrap items-center justify-between gap-3 mb-6">
    <div>
      <h1 class="text-3xl font-extrabold tracking-tight text-white flex items-center gap-3">
        <span class="w-11 h-11 rounded-2xl btn-gold flex items-center justify-center text-ink-950 glow-gold">⚐</span>
        Offers
        <!-- Live badge: visible when WebSocket is subscribed to the user's channel -->
        <span x-show="wsSubscribed" x-cloak
              class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-emerald-500/15 border border-emerald-400/30 text-emerald-300 text-[10px] font-extrabold uppercase tracking-wider"
              title="Receiving live updates via WebSocket">
          <span class="relative flex w-1.5 h-1.5">
            <span class="absolute inset-0 rounded-full bg-emerald-400 animate-ping opacity-60" style="animation-duration: 1.8s;"></span>
            <span class="relative inline-flex w-1.5 h-1.5 rounded-full bg-emerald-400"></span>
          </span>
          Live
        </span>
      </h1>
      <p class="text-sm text-white/40 mt-1">Your buy and sell offers, escrow status, and refund windows.</p>
    </div>
    <button @click="$dispatch('open-nft-picker', {action: 'offer'})"
            class="inline-flex items-center gap-1.5 px-5 py-2.5 rounded-xl btn-gold hover:opacity-95 text-ink-950 text-sm font-extrabold transition glow-gold shadow-lg shadow-gold-500/30 active:scale-[0.97]">
      <span class="text-base leading-none">＋</span> Make an Offer
    </button>
  </div>

  {{if not .Addr}}
  <div class="bg-ink-900/80 backdrop-blur rounded-2xl p-8 mb-6 text-center border border-white/10">
    <div class="w-14 h-14 rounded-2xl btn-sky flex items-center justify-center mx-auto mb-4 glow-sky text-ink-950 text-2xl">⌬</div>
    <p class="text-white/80 mb-4">Connect your wallet to view your offers</p>
    <button onclick="window.MW_CONNECT_WALLET()"
            class="px-6 py-2.5 rounded-xl btn-sky hover:opacity-95 text-ink-950 font-extrabold transition glow-sky shadow-lg shadow-sky-500/30">Connect Wallet</button>
  </div>
  {{end}}

  <!-- Tab bar. The counter badges are refreshed on every partial swap via
       hx-swap="outerHTML" on the entire tab bar + list region combined.
       The Alpine x-data tab state is preserved on the outer div (above)
       so the active-tab selection survives the inner swap. -->
  <div id="offers-tab-bar"
       hx-get="/partials/offers?addr={{.Addr}}"
       hx-trigger="{{if .Addr}}sse:offer-updated, sse:listing-updated, every 30s [!document.hidden]{{end}}"
       hx-swap="outerHTML"
       hx-target="#offers-tab-bar"
       hx-on:htmx:after-swap="Alpine.initTree(event.detail.target)">
    <div class="flex gap-2 mb-6 border-b border-white/10">
      <button @click="tab='received'"
              :class="tab==='received' ? 'text-sky-200 border-sky-300 bg-sky-500/10' : 'text-white/40 border-transparent hover:text-white'"
              class="px-4 py-3 text-xs font-extrabold border-b-2 transition uppercase tracking-wider flex items-center gap-2">
        Received
        <span class="px-1.5 py-0.5 rounded bg-white/5 text-[10px] font-mono" x-text="'{{len .Received}}'"></span>
      </button>
      <button @click="tab='sent'"
              :class="tab==='sent' ? 'text-gold-200 border-gold-300 bg-gold-500/10' : 'text-white/40 border-transparent hover:text-white'"
              class="px-4 py-3 text-xs font-extrabold border-b-2 transition uppercase tracking-wider flex items-center gap-2">
        Sent
        <span class="px-1.5 py-0.5 rounded bg-white/5 text-[10px] font-mono" x-text="'{{len .Sent}}'"></span>
      </button>
    </div>

    <!-- Live list region — only the offer rows flip. Alpine x-show inside
         (gating received vs sent) is re-init'd automatically on swap so
         the swapped children pick up the active tab gating. -->
    <div>
    {{template "partials/offers_live.html" .}}
    </div>
  </div>
</div>
{{end}}

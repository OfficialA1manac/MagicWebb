app = "magicwebb"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"
  [build.args]
    REOWN_PROJECT_ID = "af6aba4c71274871c3d77a60050171ba"

# Non-secret config. WalletConnect project IDs are PUBLIC client identifiers
# (used by the dApp at runtime to look up the pairing relay) — embedding
# them in the non-secret env block keeps WC working without requiring a
# `fly secrets set`. Secrets (POSTGRES_URL, JWT_SECRET, KEEPER_KEY,
# SERVICE_TOKEN) go through `fly secrets set`.
[env]
  ENV = "production"
  HTTP_ADDR = ":8080"
  RPC_URL = "https://coston2-api.flare.network/ext/C/rpc"
  RPC_URLS = "https://coston2-api.flare.network/ext/C/rpc,https://coston2.enosys.global/ext/C/rpc,https://rpc.ankr.com/flare_coston2"
  CHAIN_ID = "114"
  MARKETPLACE_ADDR = "0x34b53209eC694Ce243e28606233CFc72D0673436"
  AUCTION_ADDR = "0x93627Ca0032bc1B8eE0D9134a7c9c4f74d97d04C"
  OFFERBOOK_ADDR = "0x918bF8748c9950Dc6aDbB2796dE6DfFaf3f44d5E"
  NFT_ADDR = "0x832d74Cfbb4617B50C32cD110dfe16837A359B35"
  MARKETPLACE_MANAGER_ADDR = "0xCb4424999B04f7e747cc33Aa3f99fdeB36Cd9E4F"
  # Optional read-replica pool for query offloading. When set to a Neon
  # read-only branch endpoint (e.g. postgresql://user:pass@ep-<branch>-reader.us-east-2.aws.neon.tech/magicwebb?sslmode=require),
  # read-heavy API queries are routed through the replica while writes
  # always hit the primary. Unset = all reads use the primary.
  # READ_POOL_URL =
  # NFT contracts the indexer must watch for Transfer events. Add any
  # collection that has never been listed/auctioned on the marketplace
  # so WalletNFTs returns held NFTs from that collection.
  TRACKED_COLLECTIONS = "0x832d74Cfbb4617B50C32cD110dfe16837A359B35"
  INDEX_FROM_BLOCK = "32544000"
  SIWE_DOMAIN = "magicwebb.fly.dev"
  FRONTEND_URL = "https://magicwebb.fly.dev"
  # WalletConnect v2 cloud relay project id. The pair-UIs (Browse Wallet +
  # WalletConnect QR) are injected into the layout from this env so a
  # redeploy never strands users on a hardcoded / stale ID.
  WC_PROJECT_ID = "af6aba4c71274871c3d77a60050171ba"

[http_service]
  internal_port = 8080
  force_https = true
  # Indexer + keeper run in-process: the machine must never scale to zero.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[checks]
  [checks.health]
    type = "http"
    port = 8080
    path = "/healthz"
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"

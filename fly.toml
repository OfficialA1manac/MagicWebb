app = "magicwebb"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

# Non-secret config. Secrets (POSTGRES_URL, JWT_SECRET, KEEPER_KEY,
# SERVICE_TOKEN, WC_PROJECT_ID, PINATA_JWT) go through `fly secrets set`.
[env]
  ENV = "production"
  HTTP_ADDR = ":8080"
  RPC_URL = "https://coston2-api.flare.network/ext/C/rpc"
  RPC_URLS = "https://coston2-api.flare.network/ext/C/rpc,https://coston2.enosys.global/ext/C/rpc,https://rpc.ankr.com/flare_coston2"
  CHAIN_ID = "114"
  MARKETPLACE_ADDR = "0x06BF7BA62B51DCE7BE24acBdB906Af9ed8853906"
  AUCTION_ADDR = "0xA890008cc572809f255934aD8c1De2994B015CBF"
  OFFERBOOK_ADDR = "0x53e27c0fEeA6ADb38D6D420c4CE009bc62cA89C1"
  INDEX_FROM_BLOCK = "31630816"
  SIWE_DOMAIN = "magicwebb.fly.dev"
  FRONTEND_URL = "https://magicwebb.fly.dev"

[http_service]
  internal_port = 8080
  force_https = true
  # Indexer + keeper run in-process: the machine must never scale to zero.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[checks]
  [checks.health]
    type = "http"
    port = 8080
    path = "/healthz"
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
